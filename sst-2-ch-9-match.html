<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Match the following</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#dff6ff,#ffffff,#e8f5e9);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.quiz-box{
width:100%;
max-width:1100px;
background:#ffffff;
border-radius:30px;
padding:35px 28px 40px;
border:5px solid #00b8f0;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
position:relative;
overflow:hidden;
}

.quiz-box::before{
content:"";
position:absolute;
top:-70px;
right:-70px;
width:220px;
height:220px;
background:rgba(0,184,240,0.08);
border-radius:50%;
}

.quiz-box::after{
content:"";
position:absolute;
bottom:-70px;
left:-70px;
width:220px;
height:220px;
background:rgba(255,64,129,0.08);
border-radius:50%;
}

.heading{
font-size:30px;
font-weight:700;
color:#00a6d6;
margin-bottom:30px;
position:relative;
z-index:2;
}

.match-wrapper{
position:relative;
display:flex;
justify-content:space-between;
gap:40px;
z-index:2;
}

.column{
width:48%;
display:flex;
flex-direction:column;
gap:16px;
}

.item-row{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
background:#f9fcff;
border:2px solid #c9efff;
border-radius:18px;
padding:16px;
transition:0.3s;
}

.item-row:hover{
transform:translateY(-3px);
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.item-text{
font-size:20px;
font-weight:500;
color:#444;
line-height:1.5;
flex:1;
}

.dot{
width:18px;
height:18px;
min-width:18px;
min-height:18px;
background:#fff;
border:3px solid #ff4fa0;
transform:rotate(45deg);
cursor:pointer;
transition:0.3s;
position:relative;
z-index:10;
}

.dot:hover{
transform:rotate(45deg) scale(1.2);
}

.dot.active{
background:#ff4fa0;
}

.dot.connected{
background:#009688;
border-color:#009688;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:visible;
z-index:1;
}

line{
stroke:#009688;
stroke-width:5;
stroke-linecap:round;
}

.result{
margin-top:28px;
text-align:center;
font-size:28px;
font-weight:700;
color:#0047ab;
position:relative;
z-index:2;
}

.buttons{
text-align:center;
margin-top:24px;
position:relative;
z-index:2;
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:#fff;
border:none;
padding:14px 34px;
border-radius:40px;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 18px rgba(255,152,0,0.35);
}

.reset-btn:hover{
transform:translateY(-2px) scale(1.05);
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

body{
padding:10px;
align-items:flex-start;
}

.quiz-box{
padding:20px 14px 28px;
border-radius:22px;
}

.heading{
font-size:22px;
line-height:1.5;
margin-bottom:20px;
}

.match-wrapper{
display:flex;
flex-direction:row;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.column{
width:48%;
gap:12px;
}

.item-row{
padding:12px 10px;
border-radius:14px;
min-height:72px;
}

.item-text{
font-size:14px;
line-height:1.4;
word-break:break-word;
}

.dot{
width:14px;
height:14px;
min-width:14px;
min-height:14px;
border-width:2px;
}

svg{
display:block;
}

line{
stroke-width:3;
}

.result{
font-size:20px;
margin-top:18px;
}

.buttons{
margin-top:18px;
}

.reset-btn{
width:100%;
font-size:15px;
padding:13px 16px;
border-radius:30px;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="heading">
3. Match the following.
</div>

<div class="match-wrapper" id="matchWrapper">

<svg id="svgLines"></svg>

<div class="column">

<div class="item-row">
<div class="item-text">
a. Skating
</div>
<div class="dot left-dot" data-match="iii"></div>
</div>

<div class="item-row">
<div class="item-text">
b. Painting
</div>
<div class="dot left-dot" data-match="v"></div>
</div>

<div class="item-row">
<div class="item-text">
c. Ludo
</div>
<div class="dot left-dot" data-match="i"></div>
</div>

<div class="item-row">
<div class="item-text">
d. Cycling
</div>
<div class="dot left-dot" data-match="ii"></div>
</div>

<div class="item-row">
<div class="item-text">
e. Cricket
</div>
<div class="dot left-dot" data-match="iv"></div>
</div>

</div>

<div class="column">

<div class="item-row">
<div class="dot right-dot" data-id="i"></div>
<div class="item-text">
i. Board and Counters
</div>
</div>

<div class="item-row">
<div class="dot right-dot" data-id="ii"></div>
<div class="item-text">
ii. A Bicycle
</div>
</div>

<div class="item-row">
<div class="dot right-dot" data-id="iii"></div>
<div class="item-text">
iii. Wheels on Shoes
</div>
</div>

<div class="item-row">
<div class="dot right-dot" data-id="iv"></div>
<div class="item-text">
iv. Bat and Ball
</div>
</div>

<div class="item-row">
<div class="dot right-dot" data-id="v"></div>
<div class="item-text">
v. Brushes and Colours
</div>
</div>

</div>

</div>

<div class="result" id="result">
Score: 0 / 5
</div>

<div class="buttons">

<button class="reset-btn" onclick="resetGame()">
Reset
</button>

</div>

</div>

<script>

let selectedLeft = null;
let score = 0;
let totalMatched = 0;

const leftDots = document.querySelectorAll(".left-dot");
const rightDots = document.querySelectorAll(".right-dot");

const svg = document.getElementById("svgLines");

leftDots.forEach(dot=>{

dot.addEventListener("click",()=>{

if(dot.classList.contains("connected")) return;

leftDots.forEach(d=>d.classList.remove("active"));

selectedLeft = dot;

dot.classList.add("active");

});

});

rightDots.forEach(dot=>{

dot.addEventListener("click",()=>{

if(!selectedLeft) return;

if(dot.classList.contains("connected")) return;

drawLine(selectedLeft,dot);

const correctMatch = selectedLeft.dataset.match;
const selectedMatch = dot.dataset.id;

selectedLeft.classList.remove("active");

selectedLeft.classList.add("connected");

dot.classList.add("connected");

selectedLeft.style.pointerEvents = "none";
dot.style.pointerEvents = "none";

if(correctMatch === selectedMatch){
score++;
}

totalMatched++;

document.getElementById("result").innerText =
`Score: ${score} / 5`;

if(totalMatched === 5){

let incorrect = 5 - score;

setTimeout(()=>{

alert(
`✅ Correct Matches: ${score}\n❌ Incorrect Matches: ${incorrect}`
);

},300);

}

selectedLeft = null;

});

});

function drawLine(leftDot,rightDot){

const wrapper = document.getElementById("matchWrapper");

const wrapperRect = wrapper.getBoundingClientRect();

const leftRect = leftDot.getBoundingClientRect();
const rightRect = rightDot.getBoundingClientRect();

const x1 =
leftRect.left +
leftRect.width/2 -
wrapperRect.left;

const y1 =
leftRect.top +
leftRect.height/2 -
wrapperRect.top;

const x2 =
rightRect.left +
rightRect.width/2 -
wrapperRect.left;

const y2 =
rightRect.top +
rightRect.height/2 -
wrapperRect.top;

const line = document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);

line.setAttribute("x1",x1);
line.setAttribute("y1",y1);
line.setAttribute("x2",x2);
line.setAttribute("y2",y2);

svg.appendChild(line);

}

function resetGame(){

svg.innerHTML = "";

score = 0;
totalMatched = 0;

document.getElementById("result").innerText =
"Score: 0 / 5";

leftDots.forEach(dot=>{

dot.classList.remove("active","connected");

dot.style.pointerEvents = "auto";

});

rightDots.forEach(dot=>{

dot.classList.remove("connected");

dot.style.pointerEvents = "auto";

});

selectedLeft = null;

}

</script>

</body>
</html>
