<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Festival Quiz</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#f7fbff,#fff6f9);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .worksheet{
      width:100%;
      max-width:1050px;
      background:#fff;
      border-radius:24px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.12);
      border:4px solid #59c8eb;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:20px;
    }

    .heading{
      color:#08a4e8;
      font-size:34px;
      font-weight:bold;
    }

    .badge{
      background:#a8a300;
      color:#fff;
      padding:8px 16px;
      border-radius:20px;
      font-size:15px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .sub-heading{
      font-size:24px;
      color:#333;
      margin-bottom:28px;
      font-weight:600;
    }

    .question-box{
      background:#fbfdff;
      border:2px solid #ccefff;
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
    }

    .question{
      font-size:30px;
      color:#222;
      margin-bottom:18px;
      line-height:1.5;
      font-weight:600;
    }

    .options{
      display:flex;
      flex-wrap:wrap;
      gap:18px;
      align-items:center;
    }

    .option{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:22px;
      cursor:pointer;
      padding:8px 10px;
      border-radius:10px;
      transition:0.3s;
    }

    .option:hover{
      background:#eef9ff;
    }

    .checkbox{
      width:26px;
      height:26px;
      border:3px solid #ff3f98;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:18px;
      font-weight:bold;
      color:#fff;
      background:#fff;
    }

    .option.correct .checkbox{
      background:#25b04b;
      border-color:#25b04b;
      color:#fff;
    }

    .option.wrong .checkbox{
      background:#e53935;
      border-color:#e53935;
      color:#fff;
    }

    .option.correct{
      color:#138332;
      font-weight:bold;
    }

    .option.wrong{
      color:#b71c1c;
      font-weight:bold;
    }

    .result{
      margin-top:25px;
      text-align:center;
      font-size:28px;
      color:#0d47a1;
      font-weight:bold;
    }

    .btn-area{
      text-align:center;
      margin-top:20px;
    }

    button{
      border:none;
      padding:14px 30px;
      border-radius:30px;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
      margin:6px;
      color:#fff;
      box-shadow:0 5px 12px rgba(0,0,0,0.2);
    }

    .reset-btn{
      background:#ff9800;
    }

    @media(max-width:700px){

      .worksheet{
        padding:18px;
      }

      .heading{
        font-size:26px;
      }

      .sub-heading{
        font-size:18px;
      }

      .question{
        font-size:22px;
      }

      .option{
        font-size:18px;
      }

    }

  </style>
</head>

<body>

<div class="worksheet">

  <div class="top-bar">

    <div class="heading">
      A. Tick (✓) the correct option.
    </div>

    <div class="badge">
      DECISION MAKING
    </div>

  </div>

  <div class="sub-heading">
    Choose the correct answer for each question.
  </div>

  <div id="quiz"></div>

  <div class="result" id="result">
    Score : 0 / 5
  </div>

  <div class="btn-area">

    <button class="reset-btn" onclick="resetQuiz()">
      Reset Quiz
    </button>

  </div>

</div>

<script>

const questions = [

  {
    question : "1. Which festival is known as the 'Festival of colours'?",
    options : [
      "i. Holi",
      "ii. Diwali",
      "iii. Christmas"
    ],
    answer : "i. Holi"
  },

  {
    question : "2. Whose birthday is celebrated on 2nd October ?",
    options : [
      "i. Lord Rama",
      "ii. King Mahabali",
      "iii. Mahatma Gandhi"
    ],
    answer : "iii. Mahatma Gandhi"
  },

  {
    question : "3. Which festival is famous for its snake boat races?",
    options : [
      "i. Onam",
      "ii. Diwali",
      "iii. Pongal"
    ],
    answer : "i. Onam"
  },

  {
    question : "4. Which of the following is a harvest festival?",
    options : [
      "i. Diwali",
      "ii. Pongal",
      "iii. Christmas"
    ],
    answer : "ii. Pongal"
  },

  {
    question : "5. Independence day is celebrated on which month and date every year?",
    options : [
      "i. 12 July",
      "ii. 15 August",
      "iii. 14 September"
    ],
    answer : "ii. 15 August"
  }

];

let score = 0;
let answered = 0;

function loadQuiz(){

  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  questions.forEach((q)=>{

    const box = document.createElement("div");
    box.className = "question-box";

    const title = document.createElement("div");
    title.className = "question";
    title.innerText = q.question;

    const optionsDiv = document.createElement("div");
    optionsDiv.className = "options";

    q.options.forEach((opt)=>{

      const option = document.createElement("div");
      option.className = "option";

      option.innerHTML = `
        <span>${opt}</span>
        <div class="checkbox"></div>
      `;

      option.onclick = ()=>checkAnswer(option,opt,q.answer,optionsDiv);

      optionsDiv.appendChild(option);

    });

    box.appendChild(title);
    box.appendChild(optionsDiv);

    quiz.appendChild(box);

  });

}

function checkAnswer(selectedOption,selected,correctAnswer,optionsDiv){

  const options = optionsDiv.querySelectorAll(".option");

  options.forEach((option)=>{

    option.style.pointerEvents = "none";

    const text = option.querySelector("span").innerText;
    const checkbox = option.querySelector(".checkbox");

    if(text === correctAnswer){

      option.classList.add("correct");
      checkbox.innerHTML = "✓";

    }

  });

  if(selected !== correctAnswer){

    selectedOption.classList.add("wrong");

    const wrongBox = selectedOption.querySelector(".checkbox");
    wrongBox.innerHTML = "✕";

  }else{

    score++;

  }

  answered++;

  document.getElementById("result").innerText =
  `Score : ${score} / ${questions.length}`;

  if(answered === questions.length){

    setTimeout(()=>{

      alert(`Great Job! Your final score is ${score} out of ${questions.length}`);

    },300);

  }

}

function resetQuiz(){

  score = 0;
  answered = 0;

  document.getElementById("result").innerText =
  `Score : 0 / ${questions.length}`;

  loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
