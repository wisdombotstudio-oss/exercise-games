<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fill in the Missing Letters</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f2f7fb;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.main-box{
width:100%;
max-width:1200px;
background:#fff;
border-radius:28px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
border:4px solid #00aeea;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.heading{
font-size:32px;
font-weight:700;
color:#00aeea;
}

.badge{
background:#f37021;
color:#fff;
padding:10px 20px;
font-size:18px;
font-weight:700;
border-radius:10px;
}

.exercise-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px 30px;
}

.card{
text-align:center;
}

.card img{
width:100%;
max-width:220px;
height:140px;
object-fit:cover;
border-radius:4px;
border:2px solid #ddd;
margin-bottom:15px;
}

.word{
font-size:32px;
font-weight:600;
color:#333;
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:4px;
}

.letter-input{
width:38px;
height:42px;
border:2px solid #00aeea;
border-radius:8px;
text-align:center;
font-size:24px;
font-weight:700;
text-transform:uppercase;
outline:none;
}

.letter-input:focus{
border-color:#ff4f9a;
box-shadow:0 0 10px rgba(255,79,154,0.2);
}

.correct{
background:#e8f5e9;
border-color:#2e7d32;
color:#1b5e20;
}

.wrong{
background:#ffebee;
border-color:#c62828;
color:#b71c1c;
}

.buttons{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:14px 32px;
border:none;
border-radius:40px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.3s;
color:#fff;
}

.check-btn{
background:linear-gradient(135deg,#00c853,#009624);
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
}

.btn:hover{
transform:translateY(-3px) scale(1.05);
}

.result{
margin-top:30px;
text-align:center;
font-size:32px;
font-weight:700;
color:#0047ab;
}

@media(max-width:900px){

.exercise-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.exercise-grid{
grid-template-columns:1fr;
}

.heading{
font-size:22px;
}

.word{
font-size:24px;
}

.letter-input{
width:34px;
height:38px;
font-size:20px;
}

.btn{
width:100%;
}

}

</style>
</head>

<body>

<div class="main-box">

<div class="top-bar">

<div class="heading">
B. Write the names of these fruits and vegetables.
</div>

<div class="badge">
EVALUATION
</div>

</div>

<div class="exercise-grid">

<!-- TOMATO -->
<div class="card">

<img src="https://images.unsplash.com/photo-1546094096-0df4bcaaa337?q=80&w=1200&auto=format&fit=crop">

<div class="word">
T O
<input maxlength="1" class="letter-input" id="t1">
A
<input maxlength="1" class="letter-input" id="t2">
O
</div>

</div>

<!-- BANANA -->
<div class="card">

<img src="https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?q=80&w=1200&auto=format&fit=crop">

<div class="word">
B
<input maxlength="1" class="letter-input" id="b1">
N A
<input maxlength="1" class="letter-input" id="b2">
A
</div>

</div>

<!-- CAULIFLOWER -->
<div class="card">

<img src="https://images.unsplash.com/photo-1510627498534-cf7e9002facc?q=80&w=1200&auto=format&fit=crop">

<div class="word">
C A
<input maxlength="1" class="letter-input" id="c1">
L I F L O
<input maxlength="1" class="letter-input" id="c2">
E
<input maxlength="1" class="letter-input" id="c3">
</div>

</div>

<!-- POTATO -->
<div class="card">

<img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?q=80&w=1200&auto=format&fit=crop">

<div class="word">
P O
<input maxlength="1" class="letter-input" id="p1">
A T
<input maxlength="1" class="letter-input" id="p2">
</div>

</div>

<!-- ONION -->
<div class="card">

<img src="https://images.unsplash.com/photo-1508747703725-719777637510?q=80&w=1200&auto=format&fit=crop">

<div class="word">
O
<input maxlength="1" class="letter-input" id="o1">
I
<input maxlength="1" class="letter-input" id="o2">
N
</div>

</div>

<!-- PAPAYA -->
<div class="card">

<img src="https://images.unsplash.com/photo-1617112848923-cc2234396a8d?q=80&w=1200&auto=format&fit=crop">

<div class="word">
P A
<input maxlength="1" class="letter-input" id="pa1">
A
<input maxlength="1" class="letter-input" id="pa2">
A
</div>

</div>

</div>

<div class="buttons">

<button class="btn check-btn" onclick="checkAnswers()">
Check Answers
</button>

<button class="btn reset-btn" onclick="resetAnswers()">
Reset
</button>

</div>

<div class="result" id="result">
Score: 0 / 13
</div>

</div>

<script>

const answers = {

t1:'M',
t2:'T',

b1:'A',
b2:'N',

c1:'U',
c2:'W',
c3:'R',

p1:'T',
p2:'O',

o1:'N',
o2:'O',

pa1:'P',
pa2:'Y'

};

function checkAnswers(){

let score = 0;

for(let id in answers){

const input = document.getElementById(id);

const value = input.value.toUpperCase();

input.classList.remove("correct","wrong");

if(value === answers[id]){

input.classList.add("correct");

score++;

}else{

input.classList.add("wrong");

}

}

document.getElementById("result").innerText =
`Score: ${score} / 13`;

}

function resetAnswers(){

for(let id in answers){

const input = document.getElementById(id);

input.value = '';

input.classList.remove("correct","wrong");

}

document.getElementById("result").innerText =
"Score: 0 / 13";

}

</script>

</body>
</html>
