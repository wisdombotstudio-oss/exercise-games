            { id: 'scarf',      name: 'Scarf',      isSummer: false, img: 'https://upload.wikimedia.org/wikipedia/commons/9/90/100%25_Kaschmir_Wolle_vonk_kaschmirprodukte.de.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original' },
            { id: 'fan',        name: 'Fan',        isSummer: true,  img: 'https://upload.wikimedia.org/wikipedia/commons/c/c4/Fan_2024.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original' },
            { id: 'raincoat',   name: 'Raincoat',   isSummer: false, img: 'https://images.unsplash.com/photo-1504450758481-7338eba7524a?auto=format&fit=crop&w=400&q=80' }
        ];

        let selectedItems = new Set();
        let isEvaluated = false;

        function initQuiz() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';

            items.forEach(item => {
                const isSelected = selectedItems.has(item.id);
                const circleContent = isSelected ? '<span class="text-teal-500 pop">✓</span>' : '';

                grid.insertAdjacentHTML('beforeend', `
                    <div id="card-${item.id}" class="card-dashed relative bg-white rounded-2xl p-4 cursor-pointer flex items-center justify-center h-40 md:h-48" onclick="toggleSelection('${item.id}')">
                        
                        <img src="${item.img}" alt="${item.name}" 
                             onerror="this.onerror=null; this.src='https://placehold.co/400x300/f8fafc/64748b?text=${item.name}';" 
                             class="max-w-full max-h-full object-contain pointer-events-none rounded-lg" draggable="false">
                        
                        <!-- Checkbox Circle at the bottom edge -->
                        <div id="circle-${item.id}" class="absolute -bottom-6 left-1/2 transform -translate-x-1/2 w-12 h-12 rounded-full border-2 border-orange-500 bg-white shadow-sm flex items-center justify-center text-3xl font-black transition-colors">
                            ${circleContent}
                        </div>
                        
                    </div>
                `);
            });
        }

        function toggleSelection(id) {
            if (isEvaluated) return; // Lock the quiz after submission

            const circle = document.getElementById(`circle-${id}`);
            
            if (selectedItems.has(id)) {
                selectedItems.delete(id);
                circle.innerHTML = '';
            } else {
                selectedItems.add(id);
                circle.innerHTML = '<span class="text-teal-500 pop">✓</span>';
            }
        }

        function checkAnswers() {
            if (isEvaluated) return;
            isEvaluated = true;

            let score = 0;
            const totalSummerItems = items.filter(i => i.isSummer).length;

            items.forEach(item => {
                const card = document.getElementById(`card-${item.id}`);
                const circle = document.getElementById(`circle-${item.id}`);
                const isSelected = selectedItems.has(item.id);

                // Reset borders
                card.classList.remove('border-dashed', 'border-gray-400');
                circle.classList.remove('border-orange-500');

                if (item.isSummer && isSelected) {
                    // Correctly selected a summer item
                    score++;
                    card.classList.add('border-solid', 'border-green-400', 'bg-green-50');
                    circle.classList.add('border-green-500', 'bg-green-100');
                    circle.innerHTML = '<span class="text-green-600 pop">✓</span>';
                } 
                else if (!item.isSummer && isSelected) {
                    // Incorrectly selected a NON-summer item
                    card.classList.add('border-solid', 'border-red-400', 'bg-red-50');
                    circle.classList.add('border-red-500', 'bg-red-100');
                    circle.innerHTML = '<span class="text-red-600 pop">✗</span>';
                }
                else if (item.isSummer && !isSelected) {
                    // Missed a summer item
                    card.classList.add('border-solid', 'border-yellow-400', 'bg-yellow-50');
                    circle.classList.add('border-yellow-500', 'bg-yellow-100');
                    circle.innerHTML = '<span class="text-yellow-500 pop opacity-50">✓</span>';
                }
                else {
                    // Correctly left a non-summer item unselected
                    card.classList.add('border-dashed', 'border-gray-300', 'opacity-60');
                    circle.classList.add('border-gray-300');
                }
            });

            // Handle UI Updates
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('retry-btn').classList.remove('hidden');
            
            const resultsArea = document.getElementById('results-area');
            resultsArea.classList.remove('hidden');
            resultsArea.classList.add('pop');

            if (score === totalSummerItems && selectedItems.size === totalSummerItems) {
                resultsArea.innerHTML = `<span class="text-green-600">Excellent! You found all ${score} summer things! 🍉☀️</span>`;
            } else {
                resultsArea.innerHTML = `<span class="text-orange-500">You found ${score} out of ${totalSummerItems} summer things. Keep practicing!</span>`;
            }
        }

        function resetQuiz() {
            selectedItems.clear();
            isEvaluated = false;
            
            document.getElementById('check-btn').classList.remove('hidden');
            document.getElementById('retry-btn').classList.add('hidden');
            document.getElementById('results-area').classList.add('hidden');
            
            initQuiz();
        }

        // Initialize on page load
        window.onload = initQuiz;
    </script>

</body></html>
