<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Write True or False</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.quiz-box{
width:100%;
max-width:950px;
background:#f7f7f7;
border-radius:22px;
padding:28px 24px 35px;
border:4px solid #00bdf2;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.heading{
font-size:24px;
font-weight:bold;
color:#00a6d6;
margin-bottom:28px;
font-family:Georgia,serif;
}

.question-box{
margin-bottom:24px;
padding-bottom:12px;
border-bottom:1px dashed #cccccc;
}

.question-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
}

.question{
font-size:20px;
font-family:Georgia,serif;
color:#5a2d82;
line-height:1.8;
flex:1;
}

.options{
display:flex;
flex-direction:row;
gap:12px;
align-items:center;
}

.option-btn{
background:#fff;
border:2px solid #ff4fa0;
border-radius:10px;
padding:9px 18px;
font-size:15px;
font-family:Georgia,serif;
cursor:pointer;
transition:0.3s;
color:#d81b60;
font-weight:bold;
width:90px;
text-align:center;
}

.option-btn:hover{
background:#fff5fa;
}

.option-btn.correct{
background:#c8f7c5;
border-color:#2e7d32;
color:#1b5e20;
}

.option-btn.wrong{
background:#ffcdd2;
border-color:#c62828;
color:#b71c1c;
}

.result{
margin-top:24px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#003db8;
}

.buttons{
text-align:center;
margin-top:24px;
}

.reset-btn{
background:#ff9800;
color:#fff;
border:none;
padding:11px 30px;
border-radius:28px;
font-size:16px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.reset-btn:hover{
background:#f57c00;
}

@media(max-width:768px){

.question-row{
flex-direction:column;
align-items:flex-start;
}

.question{
font-size:17px;
}

.options{
padding-left:10px;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="heading">
3. Write True or False.
</div>

<div id="quiz"></div>

<div class="result" id="result">
Score: 0 / 4
</div>

<div class="buttons">

<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>

</div>

</div>

<script>

const questions = [

{
question:"1. Eating only sweets can make us strong and healthy.",
answer:"False"
},

{
question:"2. Dal and eggs help our body grow.",
answer:"True"
},

{
question:"3. We should drink 4-5 glasses of water every day.",
answer:"False"
},

{
question:"4. We should eat junk food every day.",
answer:"False"
}

];

let score = 0;
let answered = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

quiz.innerHTML = "";

questions.forEach((q)=>{

const questionBox = document.createElement("div");

questionBox.className = "question-box";

const questionRow = document.createElement("div");

questionRow.className = "question-row";

const question = document.createElement("div");

question.className = "question";

question.innerText = q.question;

questionRow.appendChild(question);

const optionsDiv = document.createElement("div");

optionsDiv.className = "options";

["True","False"].forEach(option=>{

const button = document.createElement("button");

button.className = "option-btn";

button.innerText = option;

button.onclick = ()=>checkAnswer(button,option,q.answer,optionsDiv);

optionsDiv.appendChild(button);

});

questionRow.appendChild(optionsDiv);

questionBox.appendChild(questionRow);

quiz.appendChild(questionBox);

});

}

function checkAnswer(button,selected,correctAnswer,optionsDiv){

const buttons = optionsDiv.querySelectorAll(".option-btn");

buttons.forEach(btn=>{

btn.disabled = true;

if(btn.innerText === correctAnswer){

btn.classList.add("correct");

}

});

if(selected === correctAnswer){

score++;

}else{

button.classList.add("wrong");

}

answered++;

document.getElementById("result").innerText =
`Score: ${score} / ${questions.length}`;

if(answered === questions.length){

let incorrect = questions.length - score;

setTimeout(()=>{

alert(
`✅ Correct Answers: ${score}\n❌ Incorrect Answers: ${incorrect}`
);

},300);

}

}

function resetQuiz(){

score = 0;

answered = 0;

document.getElementById("result").innerText =
`Score: 0 / ${questions.length}`;

loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
