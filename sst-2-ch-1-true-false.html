<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>True or False</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.quiz-box{
width:100%;
max-width:950px;
background:#f7f7f7;
border-radius:22px;
padding:28px 24px 35px;
border:4px solid #00bdf2;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.heading{
font-size:22px;
font-weight:bold;
color:#00a6d6;
margin-bottom:24px;
font-family:Georgia,serif;
}

.question-box{
margin-bottom:22px;
}

.question{
font-size:18px;
font-family:Georgia,serif;
color:#333;
line-height:1.8;
margin-bottom:12px;
}

.options{
display:flex;
gap:14px;
padding-left:34px;
flex-wrap:wrap;
}

.option-btn{
background:#fff;
border:2px solid #ff4fa0;
border-radius:10px;
padding:10px 20px;
font-size:15px;
font-family:Georgia,serif;
cursor:pointer;
transition:0.3s;
min-width:90px;
}

.option-btn:hover{
background:#fff5fa;
}

.option-btn.correct{
background:#c8f7c5;
border-color:#2e7d32;
color:#1b5e20;
font-weight:bold;
}

.option-btn.wrong{
background:#ffcdd2;
border-color:#c62828;
color:#b71c1c;
font-weight:bold;
}

.result{
margin-top:24px;
text-align:center;
font-size:20px;
font-weight:bold;
color:#003db8;
}

.buttons{
text-align:center;
margin-top:24px;
}

.reset-btn{
background:#ff9800;
color:#fff;
border:none;
padding:11px 30px;
border-radius:28px;
font-size:15px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.reset-btn:hover{
background:#f57c00;
}

@media(max-width:768px){

.question{
font-size:16px;
}

.options{
padding-left:10px;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="heading">
3. Write True or False.
</div>

<div id="quiz"></div>

<div class="result" id="result">
Score: 0 / 4
</div>

<div class="buttons">

<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>

</div>

</div>

<script>

const questions = [

{
question:"a. Members of a family always live in the same house.",
answer:"False"
},

{
question:"b. A nuclear family is typically larger than a joint family.",
answer:"False"
},

{
question:"c. Siblings are your brothers and sisters.",
answer:"True"
},

{
question:"d. The inner circle in a family has your uncle and aunt.",
answer:"False"
}

];

let score = 0;
let answered = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

quiz.innerHTML = "";

questions.forEach((q)=>{

const questionBox = document.createElement("div");

questionBox.className = "question-box";

const question = document.createElement("div");

question.className = "question";

question.innerText = q.question;

questionBox.appendChild(question);

const optionsDiv = document.createElement("div");

optionsDiv.className = "options";

["True","False"].forEach(option=>{

const button = document.createElement("button");

button.className = "option-btn";

button.innerText = option;

button.onclick = ()=>checkAnswer(button,option,q.answer,optionsDiv);

optionsDiv.appendChild(button);

});

questionBox.appendChild(optionsDiv);

quiz.appendChild(questionBox);

});

}

function checkAnswer(button,selected,correctAnswer,optionsDiv){

const buttons = optionsDiv.querySelectorAll(".option-btn");

buttons.forEach(btn=>{

btn.disabled = true;

if(btn.innerText === correctAnswer){

btn.classList.add("correct");

}

});

if(selected === correctAnswer){

score++;

}else{

button.classList.add("wrong");

}

answered++;

document.getElementById("result").innerText =
`Score: ${score} / ${questions.length}`;

if(answered === questions.length){

let incorrect = questions.length - score;

setTimeout(()=>{

alert(
`✅ Correct: ${score}\n❌ Incorrect: ${incorrect}`
);

},300);

}

}

function resetQuiz(){

score = 0;

answered = 0;

document.getElementById("result").innerText =
`Score: 0 / ${questions.length}`;

loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
