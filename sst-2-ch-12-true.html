<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Write True or False</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#dff6ff,#ffffff,#e8f5e9);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.quiz-box{
width:100%;
max-width:1000px;
background:#ffffff;
border-radius:30px;
padding:35px 28px 40px;
border:5px solid #00b8f0;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
position:relative;
overflow:hidden;
}

.quiz-box::before{
content:"";
position:absolute;
top:-70px;
right:-70px;
width:220px;
height:220px;
background:rgba(0,184,240,0.08);
border-radius:50%;
}

.quiz-box::after{
content:"";
position:absolute;
bottom:-70px;
left:-70px;
width:220px;
height:220px;
background:rgba(255,64,129,0.08);
border-radius:50%;
}

.heading{
font-size:30px;
font-weight:700;
color:#00a6d6;
margin-bottom:28px;
line-height:1.5;
position:relative;
z-index:2;
}

.question-box{
background:#f9fcff;
border:2px solid #c9efff;
border-radius:22px;
padding:22px;
margin-bottom:20px;
transition:0.3s;
position:relative;
z-index:2;
}

.question-box:hover{
transform:translateY(-3px);
box-shadow:0 10px 22px rgba(0,0,0,0.08);
}

.question{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
font-size:24px;
font-weight:500;
color:#444;
line-height:1.8;
flex-wrap:wrap;
}

.question-text{
flex:1;
min-width:250px;
}

.options{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.option-btn{
background:#fff;
border:2px solid #ff4fa0;
border-radius:16px;
padding:10px 22px;
font-size:18px;
font-weight:600;
color:#444;
cursor:pointer;
transition:0.3s;
min-width:90px;
}

.option-btn:hover{
background:#fff0f7;
transform:scale(1.04);
}

.option-btn.correct{
background:#d4f8d4;
border-color:#2e7d32;
color:#1b5e20;
}

.option-btn.wrong{
background:#ffd9dd;
border-color:#c62828;
color:#b71c1c;
}

.result{
margin-top:24px;
text-align:center;
font-size:28px;
font-weight:700;
color:#0047ab;
position:relative;
z-index:2;
}

.buttons{
text-align:center;
margin-top:28px;
position:relative;
z-index:2;
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:#fff;
border:none;
padding:14px 30px;
border-radius:40px;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 18px rgba(255,152,0,0.3);
}

.reset-btn:hover{
transform:translateY(-2px) scale(1.04);
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

body{
padding:10px;
align-items:flex-start;
}

.quiz-box{
padding:20px 14px 28px;
border-radius:22px;
}

.heading{
font-size:22px;
line-height:1.5;
margin-bottom:18px;
}

.question-box{
padding:16px;
border-radius:18px;
margin-bottom:16px;
}

.question{
flex-direction:column;
align-items:flex-start;
font-size:17px;
line-height:1.7;
gap:14px;
}

.question-text{
min-width:100%;
}

.options{
width:100%;
display:flex;
gap:10px;
}

.option-btn{
flex:1;
font-size:15px;
padding:11px 10px;
min-width:auto;
}

.result{
font-size:22px;
margin-top:18px;
}

.reset-btn{
width:100%;
font-size:15px;
padding:13px 16px;
border-radius:30px;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="heading">
3. Write True or False.
</div>

<div id="quiz"></div>

<div class="result" id="result">
Score: 0 / 4
</div>

<div class="buttons">

<button class="reset-btn" onclick="resetQuiz()">
Reset Quiz
</button>

</div>

</div>

<script>

const questions = [

{
question:"a. The sun rises in the west every morning.",
answer:"False"
},

{
question:"b. A day has 24 hours.",
answer:"True"
},

{
question:"c. The short hand of the clock is called minute hand.",
answer:"False"
},

{
question:"d. A digital clock shows time in numbers.",
answer:"True"
}

];

let score = 0;
let answered = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

quiz.innerHTML = "";

questions.forEach((q,index)=>{

const questionBox = document.createElement("div");

questionBox.className = "question-box";

const questionDiv = document.createElement("div");

questionDiv.className = "question";

const textDiv = document.createElement("div");

textDiv.className = "question-text";

textDiv.innerText = q.question;

questionDiv.appendChild(textDiv);

const optionsDiv = document.createElement("div");

optionsDiv.className = "options";

["True","False"].forEach(option=>{

const button = document.createElement("button");

button.className = "option-btn";

button.innerText = option;

button.onclick = ()=>checkAnswer(
button,
option,
q.answer,
optionsDiv
);

optionsDiv.appendChild(button);

});

questionDiv.appendChild(optionsDiv);

questionBox.appendChild(questionDiv);

quiz.appendChild(questionBox);

});

}

function checkAnswer(button,selected,correctAnswer,optionsDiv){

const buttons = optionsDiv.querySelectorAll(".option-btn");

buttons.forEach(btn=>{

btn.disabled = true;

if(btn.innerText === correctAnswer){

btn.classList.add("correct");

}

});

if(selected === correctAnswer){

score++;

}else{

button.classList.add("wrong");

}

answered++;

document.getElementById("result").innerText =
`Score: ${score} / ${questions.length}`;

if(answered === questions.length){

let incorrect = questions.length - score;

setTimeout(()=>{

alert(
`✅ Correct Answers: ${score}\n❌ Incorrect Answers: ${incorrect}`
);

},300);

}

}

function resetQuiz(){

score = 0;

answered = 0;

document.getElementById("result").innerText =
`Score: 0 / ${questions.length}`;

loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
