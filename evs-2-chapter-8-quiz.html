<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match the Following</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#e0f7ff,#fff4d6);
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:1000px;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
border:5px solid #4fc3f7;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
gap:20px;
}

.heading{
font-size:34px;
font-weight:bold;
color:#00a0d2;
}

.badge{
background:#ff7a00;
color:white;
padding:10px 20px;
font-weight:bold;
border-radius:20px;
font-size:16px;
}

/* MATCH SECTION */

.match-wrapper{
display:grid;
grid-template-columns:1fr 120px 1fr;
gap:20px;
align-items:center;
}

.left-side,
.right-side{
display:flex;
flex-direction:column;
gap:18px;
}

.item{
background:#f5fbff;
border:2px solid #b3e5fc;
padding:16px 20px;
border-radius:16px;
font-size:26px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.item:hover{
transform:scale(1.02);
background:#e3f2fd;
}

.item.selected{
border:3px solid #1976d2;
background:#dbeafe;
}

.item.correct{
background:#c8f7c5;
border-color:#2e7d32;
color:#1b5e20;
}

.item.wrong{
background:#ffcdd2;
border-color:#c62828;
color:#b71c1c;
}

.center-line{
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
color:#ff9800;
font-weight:bold;
}

/* BUTTONS */

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:35px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px 30px;
font-size:20px;
font-weight:bold;
border-radius:30px;
cursor:pointer;
color:white;
}

.reset-btn{
background:#1565d8;
}

.score{
margin-top:25px;
text-align:center;
font-size:34px;
font-weight:bold;
color:#0b45a0;
}

/* MOBILE */

@media(max-width:850px){

.match-wrapper{
grid-template-columns:1fr;
}

.center-line{
display:none;
}

.heading{
font-size:28px;
}

.item{
font-size:20px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

<div class="heading">
B. Match the following.
</div>

<div class="badge">
EVALUATION
</div>

</div>

<div class="match-wrapper">

<!-- LEFT -->

<div class="left-side">

<div class="item" data-match="d" onclick="selectLeft(this)">
1. Home
</div>

<div class="item" data-match="c" onclick="selectLeft(this)">
2. Neighbourhood
</div>

<div class="item" data-match="a" onclick="selectLeft(this)">
3. Neighbour
</div>

<div class="item" data-match="b" onclick="selectLeft(this)">
4. Tent
</div>

</div>

<!-- CENTER -->

<div class="center-line">
↔
</div>

<!-- RIGHT -->

<div class="right-side">

<div class="item" data-id="a" onclick="matchRight(this)">
a. A person who lives near us
</div>

<div class="item" data-id="b" onclick="matchRight(this)">
b. Temporary home
</div>

<div class="item" data-id="c" onclick="matchRight(this)">
c. Area around our house
</div>

<div class="item" data-id="d" onclick="matchRight(this)">
d. A place where we live
</div>

</div>

</div>

<div class="buttons">

<button class="reset-btn" onclick="resetGame()">
Reset
</button>

</div>

<div class="score" id="score">
Score: 0 / 4
</div>

</div>

<script>

let selectedLeft = null;
let score = 0;
let totalSelected = 0;

function selectLeft(item){

if(item.classList.contains('correct')) return;

document.querySelectorAll('.left-side .item').forEach(i=>{

i.classList.remove('selected');

});

item.classList.add('selected');

selectedLeft = item;

}

function matchRight(rightItem){

if(!selectedLeft) return;

if(rightItem.classList.contains('correct')) return;

const leftMatch = selectedLeft.dataset.match;
const rightMatch = rightItem.dataset.id;

selectedLeft.classList.remove('selected');

totalSelected++;

if(leftMatch === rightMatch){

selectedLeft.classList.add('correct');
rightItem.classList.add('correct');

score++;

}else{

selectedLeft.classList.add('wrong');
rightItem.classList.add('wrong');

setTimeout(()=>{

selectedLeft.classList.remove('wrong');
rightItem.classList.remove('wrong');

},800);

}

document.getElementById('score').innerHTML =
`Score: ${score} / 4`;

selectedLeft = null;

/* FINAL ALERT */

if(totalSelected === 4){

let incorrect = 4 - score;

setTimeout(()=>{

alert(
`✅ Correct: ${score}\n❌ Incorrect: ${incorrect}`
);

},300);

}

}

function resetGame(){

score = 0;
totalSelected = 0;
selectedLeft = null;

document.querySelectorAll('.item').forEach(item=>{

item.classList.remove('selected');
item.classList.remove('correct');
item.classList.remove('wrong');

});

document.getElementById('score').innerHTML =
'Score: 0 / 4';

}

</script>

</body>
</html>
