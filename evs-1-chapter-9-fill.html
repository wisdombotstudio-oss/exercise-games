<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fill in the Blanks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
linear-gradient(135deg,#dff7ff 0%,#ffffff 50%,#eefdf3 100%);
overflow-x:hidden;
}

/* MAIN CARD */

.main-box{
width:100%;
max-width:1150px;
background:#fff;
border-radius:35px;
padding:35px;
position:relative;
overflow:hidden;
border:5px solid #00b7ff;
box-shadow:
0 20px 40px rgba(0,0,0,0.08),
0 10px 20px rgba(0,183,255,0.15);
animation:fadeIn 0.8s ease;
}

/* DECORATION */

.main-box::before{
content:"";
position:absolute;
top:-80px;
right:-80px;
width:240px;
height:240px;
background:rgba(0,183,255,0.08);
border-radius:50%;
animation:float1 8s infinite ease-in-out;
}

.main-box::after{
content:"";
position:absolute;
bottom:-90px;
left:-90px;
width:250px;
height:250px;
background:rgba(255,91,156,0.08);
border-radius:50%;
animation:float2 10s infinite ease-in-out;
}

/* TOP */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:30px;
position:relative;
z-index:2;
}

.heading{
font-size:38px;
font-weight:800;
color:#00aeea;
letter-spacing:0.5px;
}

.badge{
background:linear-gradient(135deg,#0a9fff,#006eff);
color:#fff;
padding:12px 22px;
font-size:18px;
font-weight:700;
border-radius:12px;
box-shadow:0 8px 18px rgba(0,110,255,0.25);
animation:pulse 2s infinite;
}

/* WORD BANK */

.word-bank-wrap{
display:flex;
justify-content:center;
margin-bottom:35px;
position:relative;
z-index:2;
}

.word-bank{
background:linear-gradient(135deg,#ffffff,#f7fbff);
border:3px dashed #00aeea;
border-radius:20px;
padding:18px 22px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:16px;
box-shadow:0 10px 25px rgba(0,174,234,0.08);
}

.word{
padding:10px 18px;
border-radius:30px;
background:linear-gradient(135deg,#00c6ff,#00a2ff);
color:#fff;
font-size:19px;
font-weight:600;
box-shadow:0 6px 12px rgba(0,162,255,0.25);
transition:0.3s;
}

.word:hover{
transform:translateY(-4px) scale(1.05);
}

/* QUESTIONS */

.question-list{
display:flex;
flex-direction:column;
gap:22px;
position:relative;
z-index:2;
}

.question{
background:#f9fcff;
border:2px solid #d8f2ff;
border-radius:22px;
padding:20px 22px;
font-size:24px;
font-weight:500;
color:#333;
line-height:1.8;
transition:0.3s;
animation:fadeUp 0.6s ease;
}

.question:hover{
transform:translateY(-4px);
box-shadow:0 12px 22px rgba(0,0,0,0.06);
}

.blank{
width:190px;
border:none;
border-bottom:4px solid #00aeea;
background:transparent;
outline:none;
font-size:24px;
font-weight:700;
text-align:center;
padding:4px;
color:#333;
transition:0.3s;
text-transform:lowercase;
}

.blank:focus{
border-color:#ff4f9a;
}

.blank.correct{
background:#e8f8ea;
border-color:#2e7d32;
color:#1b5e20;
border-radius:10px;
}

.blank.wrong{
background:#ffebee;
border-color:#c62828;
color:#b71c1c;
border-radius:10px;
}

/* BUTTONS */

.buttons{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
position:relative;
z-index:2;
}

.btn{
padding:15px 38px;
border:none;
border-radius:50px;
font-size:18px;
font-weight:700;
cursor:pointer;
color:#fff;
transition:0.35s;
}

.check-btn{
background:linear-gradient(135deg,#00d26a,#00a63e);
box-shadow:0 10px 20px rgba(0,180,80,0.25);
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
box-shadow:0 10px 20px rgba(255,111,0,0.25);
}

.btn:hover{
transform:translateY(-4px) scale(1.06);
}

/* RESULT */

.result{
margin-top:30px;
text-align:center;
font-size:34px;
font-weight:800;
color:#0057d8;
position:relative;
z-index:2;
}

/* ANIMATION */

@keyframes fadeIn{

from{
opacity:0;
transform:scale(0.96);
}

to{
opacity:1;
transform:scale(1);
}

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

@keyframes float1{

0%{
transform:translateY(0);
}

50%{
transform:translateY(15px);
}

100%{
transform:translateY(0);
}

}

@keyframes float2{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:768px){

.main-box{
padding:22px;
border-radius:25px;
}

.heading{
font-size:26px;
line-height:1.5;
}

.badge{
font-size:14px;
padding:8px 14px;
}

.word-bank{
gap:10px;
padding:14px;
}

.word{
font-size:15px;
padding:8px 14px;
}

.question{
font-size:18px;
padding:18px;
}

.blank{
width:120px;
font-size:18px;
}

.result{
font-size:26px;
}

.btn{
width:100%;
font-size:16px;
}

}

</style>
</head>

<body>

<div class="main-box">

<div class="top-bar">

<div class="heading">
B. Fill in the blanks.
</div>

<div class="badge">
REMEMBERING
</div>

</div>

<div class="word-bank-wrap">

<div class="word-bank">

<div class="word">caves</div>
<div class="word">igloo</div>
<div class="word">mud</div>
<div class="word">tent</div>
<div class="word">houseboat</div>

</div>

</div>

<div class="question-list">

<div class="question">
1. Early humans lived in
<input type="text" class="blank" id="q1"> .
</div>

<div class="question">
2. In Rajasthan houses have thick
<input type="text" class="blank" id="q2"> walls.
</div>

<div class="question">
3. People moving from place to place live in a
<input type="text" class="blank" id="q3"> .
</div>

<div class="question">
4. Houses built using blocks of snow and ice are called
<input type="text" class="blank" id="q4"> .
</div>

<div class="question">
5. A house that floats on water is called
<input type="text" class="blank" id="q5"> .
</div>

</div>

<div class="buttons">

<button class="btn check-btn" onclick="checkAnswers()">
Check Answers
</button>

<button class="btn reset-btn" onclick="resetAnswers()">
Reset
</button>

</div>

<div class="result" id="result">
Score: 0 / 5
</div>

</div>

<script>

const answers = {

q1:'caves',
q2:'mud',
q3:'tent',
q4:'igloo',
q5:'houseboat'

};

function checkAnswers(){

let score = 0;

for(let key in answers){

const input = document.getElementById(key);

const value = input.value.trim().toLowerCase();

input.classList.remove('correct','wrong');

if(value === answers[key]){

input.classList.add('correct');

score++;

}else{

input.classList.add('wrong');

}

}

document.getElementById('result').innerText =
`Score: ${score} / 5`;

}

function resetAnswers(){

for(let key in answers){

const input = document.getElementById(key);

input.value = '';

input.classList.remove('correct','wrong');

}

document.getElementById('result').innerText =
'Score: 0 / 5';

}

</script>

</body>
</html>
