<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Categories Exercise</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:1150px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.12);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
margin-bottom:25px;
}

.heading{
font-size:30px;
font-weight:bold;
color:#0496d1;
line-height:1.4;
}

.badge{
background:#49b7c9;
color:white;
padding:10px 18px;
font-size:16px;
font-weight:bold;
border-radius:4px;
}

.main-content{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
align-items:start;
}

/* TABLE */

.food-table{
display:grid;
grid-template-columns:repeat(3,1fr);
overflow:hidden;
border-radius:12px;
}

.column{
padding:20px;
min-height:320px;
}

.energy{
background:#dff2e5;
}

.body{
background:#f3ddeb;
}

.protective{
background:#f7e5dc;
}

.column h2{
text-align:center;
font-size:22px;
margin-bottom:30px;
color:#222;
line-height:1.4;
}

.answer-input{
width:100%;
border:none;
border-bottom:3px solid #666;
background:transparent;
font-size:24px;
padding:8px 5px;
margin:25px 0;
outline:none;
color:#c0392b;
font-family:cursive;
font-weight:bold;
}

.correct{
border-bottom:3px solid green;
color:green;
}

.wrong{
border-bottom:3px solid red;
color:red;
}

/* IMAGE */

.plate-box{
display:flex;
justify-content:center;
align-items:center;
}

.plate-box img{
width:220px;
height:220px;
border-radius:50%;
border:12px solid #d7f1da;
object-fit:cover;
background:white;
}

/* HELP BOX */

.help-box{
display:flex;
align-items:center;
border:4px solid #f3d7bc;
background:#fff;
margin-top:35px;
width:100%;
overflow:hidden;
}

.help-title{
background:#f7e3cf;
padding:18px 12px;
font-size:20px;
font-weight:bold;
text-align:center;
line-height:1.2;
min-width:90px;
}

.help-content{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px 30px;
padding:12px 18px;
font-size:18px;
color:#222;
}

.help-content span{
white-space:nowrap;
}

/* BUTTONS */

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px 30px;
font-size:20px;
font-weight:bold;
border-radius:30px;
cursor:pointer;
color:white;
}

.check-btn{
background:#ff9800;
}

.reset-btn{
background:#1565d8;
}

.score{
margin-top:25px;
text-align:center;
font-size:34px;
font-weight:bold;
color:#0b45a0;
}

/* MOBILE */

@media(max-width:900px){

.main-content{
grid-template-columns:1fr;
}

.food-table{
grid-template-columns:1fr;
}

.heading{
font-size:24px;
}

.help-box{
flex-direction:column;
align-items:stretch;
}

.help-title{
width:100%;
}

.help-content{
grid-template-columns:1fr 1fr;
font-size:16px;
gap:12px;
}

.answer-input{
font-size:20px;
}

}

</style>
</head>

</div>

<div class="help-content">

<span>Apple</span>
<span>Eggs</span>
<span>Spinach</span>

<span>Meat</span>
<span>Broccoli</span>

<!-- BUTTONS -->

<div class="buttons">

<button class="check-btn" onclick="checkAnswers()">
Check Answers
</button>

<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>

</div>

<div class="score" id="score">
Score: 0 / 9
</div>

</div>

<script>

const answers = {

e1:"apple",
e2:"bread",
e3:"carrot",

b1:"eggs",
b2:"meat",
b3:"dal",

p1:"apple",
p2:"spinach",
p3:"broccoli"

};

function checkAnswers(){

let score = 0;

for(let id in answers){

const input = document.getElementById(id);

input.classList.remove("correct");
input.classList.remove("wrong");

if(input.value.trim().toLowerCase() === answers[id]){

input.classList.add("correct");

score++;

}else{

input.classList.add("wrong");

}

}

document.getElementById("score").innerHTML =
`Score: ${score} / 9`;

let incorrect = 9 - score;

setTimeout(()=>{

alert(
`✅ Correct: ${score}\n❌ Incorrect: ${incorrect}`
);

},200);

}

function resetQuiz(){

document.querySelectorAll(".answer-input").forEach(input=>{

input.value = "";

input.classList.remove("correct");
input.classList.remove("wrong");

});

document.getElementById("score").innerHTML =
"Score: 0 / 9";

}

</script>
