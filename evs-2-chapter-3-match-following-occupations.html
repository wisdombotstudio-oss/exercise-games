<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match the Following</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ec; --primary: #f97316; --primary-light: #fed7aa;
    --green: #22c55e; --green-light: #d1fae5; --red: #ef4444;
    --red-light: #fecaca; --blue: #3b82f6; --card-bg: #fff;
    --shadow: 0 4px 20px rgba(0,0,0,0.10); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 28px 16px 48px; }
  .header { text-align: center; margin-bottom: 6px; }
  .header h1 { font-family: 'Baloo 2', cursive; font-size: 1.8rem; color: #1e293b; }
  .header h1 span { color: var(--primary); }
  .badge { display: inline-block; background: var(--primary); color: #fff; font-weight: 800;
    font-size: 0.75rem; letter-spacing: 2px; padding: 4px 14px; border-radius: 99px;
    margin: 6px 0 14px; text-transform: uppercase; }
  .hint { font-size: 0.85rem; color: #94a3b8; margin-bottom: 18px; text-align: center; }
  .exercise-area { display: flex; gap: 32px; align-items: flex-start;
    justify-content: center; width: 100%; max-width: 780px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 14px; flex: 1; min-width: 200px; }
  .img-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 10px 12px; display: flex; align-items: center; gap: 12px; cursor: pointer;
    border: 3px solid transparent; transition: border 0.2s, box-shadow 0.2s, transform 0.15s;
    position: relative; user-select: none; }
  .img-card img { width: 130px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
  .img-card .num { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-light);
    color: var(--primary); font-weight: 800; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .img-card.selected { border-color: var(--blue); box-shadow: 0 0 0 4px #bfdbfe, var(--shadow); transform: scale(1.02); }
  .img-card.correct { border-color: var(--green); background: var(--green-light); }
  .img-card.wrong { border-color: var(--red); background: var(--red-light); animation: shake 0.4s; }
  .result-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 1.3rem; display: none; }
  .img-card.correct .result-icon, .img-card.wrong .result-icon { display: block; }
  .ans-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 0 20px; height: 106px; display: flex; align-items: center; gap: 10px; cursor: pointer;
    border: 3px solid transparent; transition: border 0.2s, box-shadow 0.2s, transform 0.15s;
    user-select: none; font-size: 1rem; font-weight: 700; color: #1e293b; }
  .ans-card:hover:not(.matched):not(.wrong-flash) { border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light), var(--shadow); transform: scale(1.02); }
  .ans-card.matched { background: var(--green-light); border-color: var(--green); color: #166534; cursor: default; }
  .ans-card.wrong-flash { border-color: var(--red); background: var(--red-light); animation: shake 0.4s; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--primary-light);
    border: 2px solid var(--primary); flex-shrink: 0; }
  .ans-card.matched .dot { background: var(--green); border-color: var(--green); }
  .status-bar { margin-top: 20px; font-size: 1rem; font-weight: 700; color: #475569;
    min-height: 32px; text-align: center; }
  .status-bar.success { color: var(--green); }
  .status-bar.error { color: var(--red); }
  .btn-row { display: flex; gap: 14px; margin-top: 20px; justify-content: center; }
  button { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
    padding: 10px 26px; border-radius: 99px; border: none; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s; }
  button:active { transform: scale(0.96); }
  .btn-reset { background: #e2e8f0; color: #475569; }
  .btn-reset:hover { background: #cbd5e1; }
  .score-banner { display: none; margin-top: 22px; padding: 18px 36px; border-radius: var(--radius);
    text-align: center; font-family: 'Baloo 2', cursive; font-size: 1.5rem;
    font-weight: 800; box-shadow: var(--shadow); }
  .score-banner.show { display: block; }
  .score-banner.perfect { background: var(--green-light); color: #14532d; }
  .score-banner.partial { background: #fef9c3; color: #713f12; }
  .score-banner .sub { font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    font-weight: 600; margin-top: 4px; opacity: 0.8; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)}
    40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
</style>
</head>

      <div class="result-icon" id="icon-teacher"></div>
    </div>
  </div>
  <div class="col" id="right-col">
    <div class="ans-card" id="ans-cobbler" data-id="cobbler" onclick="selectRight(this)">
      <div class="dot"></div> Cobbler
    </div>
    <div class="ans-card" id="ans-teacher" data-id="teacher" onclick="selectRight(this)">
      <div class="dot"></div> Teacher
    </div>
    <div class="ans-card" id="ans-vegetable" data-id="vegetable" onclick="selectRight(this)">
      <div class="dot"></div> Vegetable Vendor
    </div>
    <div class="ans-card" id="ans-police" data-id="police" onclick="selectRight(this)">
      <div class="dot"></div> Policeman
    </div>
  </div>

<div class="status-bar" id="status"></div>
<div class="btn-row">
  <button class="btn-reset" onclick="resetAll()">🔄 Try Again</button>
</div>
<div class="score-banner" id="score-banner">
  <div id="score-text"></div>
  <div class="sub" id="score-sub"></div>
</div>
<script>
  const CORRECT = { vegetable:'vegetable', police:'police', cobbler:'cobbler', teacher:'teacher' };
  const LABELS = { vegetable:'Vegetable Vendor', police:'Policeman', cobbler:'Cobbler', teacher:'Teacher' };
  let selectedLeft=null, matched=new Set(), wrong=new Set();
  function selectLeft(el) {
    const id=el.dataset.id;
    if(matched.has(id)||wrong.has(id)) return;
    document.querySelectorAll('.img-card.selected').forEach(c=>c.classList.remove('selected'));
    if(selectedLeft===el){selectedLeft=null;setStatus('');return;}
    selectedLeft=el; el.classList.add('selected');
    setStatus('Now click the matching job on the right!');
  }
  function selectRight(el) {
    if(!selectedLeft){setStatus('👈 First click a picture on the left!','error');return;}
    if(el.classList.contains('matched')) return;
    const leftId=selectedLeft.dataset.id, rightId=el.dataset.id;
    if(CORRECT[leftId]===rightId){
      selectedLeft.classList.remove('selected'); selectedLeft.classList.add('correct');
      document.getElementById('icon-'+leftId).textContent='✅';
      el.classList.add('matched'); matched.add(leftId); selectedLeft=null;
      setStatus('✅ Correct! '+LABELS[rightId]+'!','success');
      if(matched.size===4) setTimeout(showFinalScore,500);
    } else {
      el.classList.add('wrong-flash'); selectedLeft.classList.add('wrong');
      selectedLeft.classList.remove('selected');
      document.getElementById('icon-'+leftId).textContent='❌';
      wrong.add(leftId); selectedLeft=null;
      setTimeout(()=>el.classList.remove('wrong-flash'),600);
      setStatus('❌ Oops! That is not correct.','error');
    }
  }
  function setStatus(msg,type){
    const bar=document.getElementById('status');
    bar.textContent=msg; bar.className='status-bar'+(type?' '+type:'');
  }
  function showFinalScore(){
    const banner=document.getElementById('score-banner');
    document.getElementById('score-text').textContent='🎉 You got '+matched.size+' / 4 correct!';
    if(wrong.size===0){banner.className='score-banner show perfect';
      document.getElementById('score-sub').textContent='Perfect score! Excellent work! 🌟';}
    else{banner.className='score-banner show partial';
      document.getElementById('score-sub').textContent='Good effort! Review and try again.';}
    setStatus('');
  }
  function resetAll(){
    selectedLeft=null; matched=new Set(); wrong=new Set();
    document.querySelectorAll('.img-card').forEach(c=>c.className='img-card');
    document.querySelectorAll('.result-icon').forEach(i=>i.textContent='');
    document.querySelectorAll('.ans-card').forEach(c=>c.classList.remove('matched','wrong-flash'));
    document.getElementById('score-banner').className='score-banner';
    setStatus('');
  }
</script>
