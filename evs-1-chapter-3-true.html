<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tick and Cross Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#eaf9ff,#ffffff,#eefbf0);
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

.main-box{
width:100%;
max-width:1100px;
background:#ffffff;
border:5px solid #00b8f0;
border-radius:30px;
padding:30px 28px 40px;
position:relative;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
animation:fadeIn 0.8s ease;
}

/* FLOATING SHAPES */

.main-box::before{
content:"";
position:absolute;
top:-70px;
right:-70px;
width:220px;
height:220px;
background:rgba(0,184,240,0.08);
border-radius:50%;
animation:floatOne 8s ease-in-out infinite;
}

.main-box::after{
content:"";
position:absolute;
bottom:-70px;
left:-70px;
width:220px;
height:220px;
background:rgba(255,64,129,0.08);
border-radius:50%;
animation:floatTwo 10s ease-in-out infinite;
}

/* HEADER */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
position:relative;
z-index:2;
gap:15px;
}

.heading{
font-size:28px;
font-weight:700;
color:#00a8e8;
line-height:1.5;
}

.badge{
background:#008dd2;
color:#fff;
padding:8px 18px;
font-size:16px;
font-weight:700;
border-radius:8px;
animation:pulse 2s infinite;
white-space:nowrap;
}

/* QUESTION BOX */

.question-box{
background:#f9fcff;
border:2px solid #c9efff;
border-radius:22px;
padding:20px;
margin-bottom:18px;
position:relative;
z-index:2;
transition:0.35s;
animation:fadeUp 0.6s ease;
}

.question-box:hover{
transform:translateY(-4px);
box-shadow:0 10px 22px rgba(0,0,0,0.08);
}

/* QUESTION ROW */

.question-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
}

/* QUESTION */

.question{
font-size:23px;
font-weight:500;
color:#333;
line-height:1.7;
flex:1;
}

/* BUTTONS */

.options{
display:flex;
gap:14px;
}

.icon-btn{
width:58px;
height:58px;
border:none;
border-radius:16px;
font-size:28px;
font-weight:700;
cursor:pointer;
transition:0.3s;
background:#fff;
border:2px solid #ff5ca8;
color:#444;
}

.icon-btn:hover{
transform:translateY(-3px) scale(1.08);
background:#fff0f7;
}

.icon-btn.correct{
background:#d9f8d9;
border-color:#2e7d32;
color:#1b5e20;
animation:correctPulse 0.5s ease;
}

.icon-btn.wrong{
background:#ffd9dd;
border-color:#c62828;
color:#b71c1c;
animation:wrongShake 0.4s ease;
}

/* SCORE */

.score{
margin-top:28px;
text-align:center;
font-size:34px;
font-weight:700;
color:#0047ab;
position:relative;
z-index:2;
}

/* RESET */

.reset-area{
text-align:center;
margin-top:24px;
position:relative;
z-index:2;
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:#fff;
border:none;
padding:14px 38px;
border-radius:40px;
font-size:18px;
font-weight:700;
cursor:pointer;
box-shadow:0 8px 18px rgba(255,152,0,0.35);
transition:0.35s;
}

.reset-btn:hover{
transform:translateY(-3px) scale(1.05);
}

/* ANIMATIONS */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeIn{

from{
opacity:0;
}

to{
opacity:1;
}

}

@keyframes correctPulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}

100%{
transform:scale(1);
}

}

@keyframes wrongShake{

0%{
transform:translateX(0);
}

25%{
transform:translateX(-6px);
}

50%{
transform:translateX(6px);
}

75%{
transform:translateX(-4px);
}

100%{
transform:translateX(0);
}

}

@keyframes floatOne{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(15px);
}

100%{
transform:translateY(0px);
}

}

@keyframes floatTwo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0px);
}

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
}

.main-box{
padding:20px 14px 30px;
border-radius:22px;
}

.top-bar{
flex-direction:column;
align-items:flex-start;
}

.heading{
font-size:21px;
}

.badge{
font-size:13px;
padding:6px 12px;
}

.question-box{
padding:16px;
}

.question-row{
flex-direction:column;
align-items:flex-start;
}

.question{
font-size:17px;
}

.options{
width:100%;
}

.icon-btn{
width:52px;
height:52px;
font-size:24px;
}

.score{
font-size:24px;
}

.reset-btn{
width:100%;
font-size:15px;
padding:13px 16px;
}

}

</style>
</head>

<body>

<div class="main-box">

<div class="top-bar">

<div class="heading">
B. Tick (✓) the correct sentence and cross out (✗) the wrong one.
</div>

<div class="badge">
REMEMBERING
</div>

</div>

<div id="quiz"></div>

<div class="score" id="score">
Score: 0 / 5
</div>

<div class="reset-area">
<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>
</div>

</div>

<script>

const questions = [

{
question:'1. Rohan and I do not like going to the zoo.',
answer:'cross'
},

{
question:'2. Our grandparents love us.',
answer:'tick'
},

{
question:'3. Our family plays outdoor and indoor games.',
answer:'tick'
},

{
question:'4. We should not tell our parents anything as it would make them angry.',
answer:'cross'
},

{
question:'5. A family always spends time enjoying together.',
answer:'tick'
}

];

let score = 0;
let answered = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

quiz.innerHTML = "";

questions.forEach((q,index)=>{

const box = document.createElement("div");

box.className = "question-box";

box.style.animationDelay = `${index * 0.15}s`;

const row = document.createElement("div");

row.className = "question-row";

const question = document.createElement("div");

question.className = "question";

question.innerText = q.question;

row.appendChild(question);

const options = document.createElement("div");

options.className = "options";

/* TICK BUTTON */

const tickBtn = document.createElement("button");

tickBtn.className = "icon-btn";

tickBtn.innerText = "✓";

tickBtn.onclick = ()=>checkAnswer(
tickBtn,
"tick",
q.answer,
options
);

/* CROSS BUTTON */

const crossBtn = document.createElement("button");

crossBtn.className = "icon-btn";

crossBtn.innerText = "✗";

crossBtn.onclick = ()=>checkAnswer(
crossBtn,
"cross",
q.answer,
options
);

options.appendChild(tickBtn);
options.appendChild(crossBtn);

row.appendChild(options);

box.appendChild(row);

quiz.appendChild(box);

});

}

function checkAnswer(button,selected,correctAnswer,optionsDiv){

const buttons = optionsDiv.querySelectorAll(".icon-btn");

buttons.forEach(btn=>{

btn.disabled = true;

if(
(correctAnswer === "tick" && btn.innerText === "✓") ||
(correctAnswer === "cross" && btn.innerText === "✗")
){
btn.classList.add("correct");
}

});

if(selected === correctAnswer){

score++;

}else{

button.classList.add("wrong");

}

answered++;

document.getElementById("score").innerText =
`Score: ${score} / ${questions.length}`;

if(answered === questions.length){

let incorrect = questions.length - score;

setTimeout(()=>{

alert(
`✅ Correct Answers: ${score}\n❌ Incorrect Answers: ${incorrect}`
);

},400);

}

}

function resetQuiz(){

score = 0;
answered = 0;

document.getElementById("score").innerText =
`Score: 0 / ${questions.length}`;

loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
