<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write the Occupations</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f0; --primary: #e63946; --primary-light: #fde8ea;
    --green: #16a34a; --green-light: #dcfce7; --red: #dc2626;
    --red-light: #fee2e2; --card: #ffffff; --blue: #1d7fd4;
    --shadow: 0 4px 24px rgba(0,0,0,0.10); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif; background: var(--bg);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 32px 16px 56px;
  }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-family: 'Baloo 2', cursive; font-size: 1.6rem; color: #1e3a5f; max-width: 620px; line-height: 1.3; }
  .header h1 span { color: var(--primary); }
  .badge {
    display: inline-block; background: var(--primary); color: #fff;
    font-weight: 800; font-size: 0.72rem; letter-spacing: 2px;
    padding: 4px 14px; border-radius: 99px; margin-top: 8px; text-transform: uppercase;
  }
  .pictures-row {
    display: flex; gap: 24px; justify-content: center;
    flex-wrap: wrap; width: 100%; max-width: 820px;
  }
  .pic-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 14px 20px;
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; flex: 1; min-width: 210px; max-width: 245px;
    opacity: 0; transform: translateY(14px);
    animation: fadeUp 0.5s ease forwards;
  }
  .pic-card:nth-child(1){ animation-delay: 0.05s }
  .pic-card:nth-child(2){ animation-delay: 0.15s }
  .pic-card:nth-child(3){ animation-delay: 0.25s }
  .pic-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
  .answer-area { width: 100%; }
  .answer-label { font-size: 0.78rem; font-weight: 700; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .input-wrap { position: relative; }
  .answer-input {
    width: 100%; border: none; border-bottom: 2.5px solid #cbd5e1;
    background: transparent; outline: none; padding: 7px 36px 7px 4px;
    font-family: 'Baloo 2', cursive; font-size: 1.05rem; font-weight: 700;
    color: #1e3a5f; text-transform: uppercase; letter-spacing: 1.5px;
    transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: var(--blue); }
  .answer-input.correct { border-color: var(--green); color: var(--green); background: var(--green-light); border-radius: 6px 6px 0 0; padding-left: 8px; }
  .answer-input.wrong   { border-color: var(--red); color: var(--red); background: var(--red-light); border-radius: 6px 6px 0 0; padding-left: 8px; animation: shake 0.35s; }
  .check-icon { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }
  .hint-text { font-size: 0.8rem; color: #94a3b8; margin-top: 6px; display: none; font-weight: 600; }
  .hint-text.show { display: block; }
  .hint-text .ans { color: var(--green); font-weight: 800; }
  .btn-row { display: flex; gap: 14px; margin-top: 28px; justify-content: center; flex-wrap: wrap; }
  button {
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
    padding: 11px 28px; border-radius: 99px; border: none; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
  }
  button:active { transform: scale(0.96); }
  .btn-check { background: var(--blue); color: #fff; box-shadow: 0 4px 14px rgba(29,127,212,0.35); }
  .btn-check:hover { box-shadow: 0 6px 20px rgba(29,127,212,0.45); }
  .btn-reset { background: #e2e8f0; color: #475569; }
  .btn-reset:hover { background: #cbd5e1; }
  .score-banner {
    display: none; margin-top: 22px; padding: 18px 40px;
    border-radius: var(--radius); text-align: center;
    font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800;
    box-shadow: var(--shadow);
  }
  .score-banner.show { display: block; }
  .score-banner.perfect { background: var(--green-light); color: #14532d; }
  .score-banner.partial { background: #fef9c3; color: #713f12; }
  .score-banner.poor    { background: var(--red-light); color: #7f1d1d; }
  .score-banner .sub { font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600; margin-top: 4px; opacity: 0.8; }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
</style>
</head>

      <div class="input-wrap">
        <input class="answer-input" id="ans-3" type="text"

<div class="btn-row">
  <button class="btn-check" onclick="checkAll()">✅ Check Answers</button>
  <button class="btn-reset" onclick="resetAll()">🔄 Try Again</button>
</div>

<div class="score-banner" id="score-banner">
  <div id="score-text"></div>
  <div class="sub" id="score-sub"></div>
</div>

<script>
  const ANSWERS = {
    1: ['BARBER','HAIR CUTTER','HAIRDRESSER','HAIRCUTTER'],
    2: ['DELIVERY PERSON','DELIVERY MAN','DELIVERY BOY','COURIER','DELIVERYMAN','DELIVERY WOMAN'],
    3: ['MASON','BRICKLAYER','BRICK LAYER','BUILDER','CONSTRUCTION WORKER'],
  };

  function checkAll() {
    let correct = 0;
    for (let q = 1; q <= 3; q++) {
      const inp = document.getElementById('ans-' + q);
      const icon = document.getElementById('icon-' + q);
      const hint = document.getElementById('hint-' + q);
      const val = inp.value.trim().toUpperCase();
      inp.classList.remove('correct','wrong');
      if (val === '') {
        icon.textContent = '';
        hint.classList.add('show');
      } else if (ANSWERS[q].includes(val)) {
        inp.classList.add('correct'); icon.textContent = '✅';
        hint.classList.remove('show'); correct++;
      } else {
        inp.classList.add('wrong'); icon.textContent = '❌';
        hint.classList.add('show');
      }
    }
    showScore(correct);
  }

  function showScore(correct) {
    const banner = document.getElementById('score-banner');
    document.getElementById('score-text').textContent = '🎯 You got ' + correct + ' / 3 correct!';
    if (correct === 3) {
      banner.className = 'score-banner show perfect';
      document.getElementById('score-sub').textContent = 'Perfect! You know all the occupations! 🌟';
    } else if (correct >= 1) {
      banner.className = 'score-banner show partial';
      document.getElementById('score-sub').textContent = 'Good try! Check the hints below each picture.';
    } else {
      banner.className = 'score-banner show poor';
      document.getElementById('score-sub').textContent = 'Keep practising! Read the hints below each picture.';
    }
  }

  function resetAll() {
    for (let q = 1; q <= 3; q++) {
      const inp = document.getElementById('ans-' + q);
      inp.value = ''; inp.classList.remove('correct','wrong');
      document.getElementById('icon-' + q).textContent = '';
      document.getElementById('hint-' + q).classList.remove('show');
    }
    document.getElementById('score-banner').className = 'score-banner';
    document.getElementById('ans-1').focus();
  }

  window.onload = () => document.getElementById('ans-1').focus();
</script>
