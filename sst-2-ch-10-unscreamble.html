<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Unscramble the following words</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#dff6ff,#ffffff,#e8f5e9);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.quiz-box{
width:100%;
max-width:950px;
background:#ffffff;
border-radius:30px;
padding:35px 28px 40px;
border:5px solid #00b8f0;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
position:relative;
overflow:hidden;
}

.quiz-box::before{
content:"";
position:absolute;
top:-70px;
right:-70px;
width:220px;
height:220px;
background:rgba(0,184,240,0.08);
border-radius:50%;
}

.quiz-box::after{
content:"";
position:absolute;
bottom:-70px;
left:-70px;
width:220px;
height:220px;
background:rgba(255,64,129,0.08);
border-radius:50%;
}

.heading{
font-size:30px;
font-weight:700;
color:#00a6d6;
margin-bottom:30px;
line-height:1.5;
position:relative;
z-index:2;
}

.question-box{
background:#f9fcff;
border:2px solid #c9efff;
border-radius:22px;
padding:22px;
margin-bottom:20px;
transition:0.3s;
position:relative;
z-index:2;
}

.question-box:hover{
transform:translateY(-3px);
box-shadow:0 10px 22px rgba(0,0,0,0.08);
}

.question{
display:flex;
align-items:center;
gap:16px;
flex-wrap:wrap;
font-size:24px;
font-weight:600;
color:#444;
line-height:1.8;
}

.word{
min-width:180px;
color:#333;
letter-spacing:1px;
}

.answer-input{
flex:1;
min-width:220px;
border:none;
border-bottom:3px solid #888;
background:transparent;
font-size:22px;
font-weight:700;
color:#d81b60;
padding:6px 10px;
outline:none;
transition:0.3s;
}

.answer-input:focus{
border-color:#00b8f0;
}

.answer-input.correct{
border-color:#2e7d32;
color:#1b5e20;
}

.answer-input.wrong{
border-color:#c62828;
color:#b71c1c;
}

.result{
margin-top:26px;
text-align:center;
font-size:28px;
font-weight:700;
color:#0047ab;
position:relative;
z-index:2;
}

.buttons{
text-align:center;
margin-top:24px;
position:relative;
z-index:2;
}

.check-btn,
.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:#fff;
border:none;
padding:14px 34px;
border-radius:40px;
font-size:17px;
font-weight:700;
cursor:pointer;
margin:8px;
transition:0.3s;
box-shadow:0 8px 18px rgba(255,152,0,0.35);
}

.check-btn:hover,
.reset-btn:hover{
transform:translateY(-2px) scale(1.05);
}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
align-items:flex-start;
}

.quiz-box{
padding:20px 14px 28px;
border-radius:22px;
}

.heading{
font-size:22px;
margin-bottom:20px;
}

.question-box{
padding:16px;
border-radius:18px;
}

.question{
font-size:18px;
gap:10px;
}

.word{
min-width:auto;
width:100%;
}

.answer-input{
width:100%;
min-width:100%;
font-size:18px;
}

.result{
font-size:22px;
margin-top:18px;
}

.check-btn,
.reset-btn{
width:100%;
font-size:15px;
padding:13px 16px;
margin:8px 0;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="heading">
4. Unscramble the following words.
</div>

<div class="question-box">

<div class="question">

<div class="word">
a. MOCPUERT
</div>

<input type="text" class="answer-input" id="q1">

</div>

</div>

<div class="question-box">

<div class="question">

<div class="word">
b. OABT
</div>

<input type="text" class="answer-input" id="q2">

</div>

</div>

<div class="question-box">

<div class="question">

<div class="word">
c. ORTEM
</div>

<input type="text" class="answer-input" id="q3">

</div>

</div>

<div class="question-box">

<div class="question">

<div class="word">
d. ARIOD
</div>

<input type="text" class="answer-input" id="q4">

</div>

</div>

<div class="buttons">

<button class="check-btn" onclick="checkAnswers()">
Check Answers
</button>

<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>

</div>

<div class="result" id="result">
Score: 0 / 4
</div>

</div>

<script>

const answers = {

q1:"computer",
q2:"boat",
q3:"metro",
q4:"radio"

};

function checkAnswers(){

let score = 0;

Object.keys(answers).forEach(id=>{

const input = document.getElementById(id);

const userAnswer = input.value.trim().toLowerCase();

const correctAnswer = answers[id];

input.classList.remove("correct","wrong");

if(userAnswer === correctAnswer){

input.classList.add("correct");

score++;

}else{

input.classList.add("wrong");

}

});

document.getElementById("result").innerText =
`Score: ${score} / 4`;

let incorrect = 4 - score;

setTimeout(()=>{

alert(
`✅ Correct Answers: ${score}\n❌ Incorrect Answers: ${incorrect}`
);

},300);

}

function resetQuiz(){

Object.keys(answers).forEach(id=>{

const input = document.getElementById(id);

input.value = "";

input.classList.remove("correct","wrong");

});

document.getElementById("result").innerText =
"Score: 0 / 4";

}

</script>

</body>
</html>
