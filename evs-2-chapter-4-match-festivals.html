<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match the Following</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#efefef;
padding:20px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:950px;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.heading{
font-size:34px;
font-weight:bold;
color:#0696c9;
}

.badge{
background:#f58220;
color:white;
padding:10px 18px;
font-weight:bold;
font-size:20px;
}

.exercise-area{
display:flex;
justify-content:center;
align-items:center;
gap:35px;
flex-wrap:wrap;
}

.col{
display:flex;
flex-direction:column;
gap:18px;
}

.image-card{
width:170px;
height:90px;
background:#fff;
border:1px solid #cfcfcf;
position:relative;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.image-card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.image-card::after{
content:'';
width:16px;
height:16px;
border-radius:50%;
background:#d9d9d9;
border:3px solid white;
position:absolute;
top:50%;
right:-12px;
transform:translateY(-50%);
}

.right-side .image-card::after{
left:-12px;
right:auto;
}

.answer-col{
display:flex;
flex-direction:column;
gap:18px;
}

.answer-card{
width:220px;
height:44px;
background:#ecd7ca;
border-radius:30px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
position:relative;
cursor:pointer;
transition:0.2s;
border:2px solid transparent;
}

.answer-card::before,
.answer-card::after{
content:'';
width:16px;
height:16px;
border-radius:50%;
background:#d9d9d9;
border:3px solid white;
position:absolute;
top:50%;
transform:translateY(-50%);
}

.answer-card::before{
left:-12px;
}

.answer-card::after{
right:-12px;
}

.selected{
border:2px solid #2563eb !important;
}

.correct{
border:2px solid #16a34a !important;
background:#dcfce7 !important;
}

.wrong{
border:2px solid #dc2626 !important;
background:#fee2e2 !important;
}

.result-icon{
position:absolute;
top:5px;
right:5px;
width:28px;
height:28px;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:bold;
color:white;
}

.correct .result-icon{
display:flex;
background:#16a34a;
}

.wrong .result-icon{
display:flex;
background:#dc2626;
}

.score-board{
text-align:center;
margin-top:35px;
}

.score{
font-size:38px;
font-weight:bold;
color:#0b45a0;
margin-bottom:20px;
}

.reset-btn{
background:#ff9800;
color:white;
border:none;
padding:14px 30px;
font-size:22px;
font-weight:bold;
border-radius:40px;
cursor:pointer;
}

.result-text{
margin-top:20px;
font-size:22px;
font-weight:bold;
line-height:1.8;
}

.correct-answer{
color:#16a34a;
}

.wrong-answer{
color:#dc2626;
}

</style>
</head>

if(!correctList.includes(formatName(leftId))){
correctList.push(formatName(leftId));
}

}else{

selectedLeft.classList.add('wrong');

selectedLeft.querySelector('.result-icon').innerHTML = "✕";

el.classList.add('wrong');

if(!wrongList.includes(formatName(leftId))){
wrongList.push(formatName(leftId));
}

setTimeout(()=>{

selectedLeft.classList.remove('wrong');
selectedLeft.classList.remove('selected');

el.classList.remove('wrong');

},1000);
}

updateResult();

selectedLeft = null;
}

function updateResult(){

document.getElementById('score').innerHTML =
`Score: ${score} / 4`;

let html = "";

if(correctList.length > 0){

html += `
<div class="correct-answer">
✅ Correct Answers: ${correctList.join(', ')}
</div>
`;
}

if(wrongList.length > 0){

html += `
<div class="wrong-answer">
❌ Incorrect Answers: ${wrongList.join(', ')}
</div>
`;
}

document.getElementById('resultText').innerHTML = html;
}

function formatName(name){

if(name === "holi") return "Holi";
if(name === "christmas") return "Christmas";
if(name === "onam") return "Onam";
if(name === "republic") return "Republic Day";

return name;
}

function resetQuiz(){

location.reload();

}
