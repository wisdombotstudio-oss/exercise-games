
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#eef9ff;padding:20px}
.main{max-width:1100px;margin:auto;background:#fff;padding:30px;border-radius:25px;border:5px solid #00b8f0}
.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:30px}
.heading{font-size:30px;font-weight:bold;color:#00a8e8}
.badge{background:#00a3b4;color:#fff;padding:8px 18px;border-radius:8px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.card{display:flex;flex-direction:column;align-items:center}
.card img{width:100%;max-width:230px;border:2px solid #ddd}
.tick{width:38px;height:38px;border:3px solid #ff2b8a;margin-top:14px;cursor:pointer;display:flex;justify-content:center;align-items:center;font-size:24px;font-weight:bold}
.tick.active{background:#ff2b8a;color:#fff}
.correct{border-color:#2e7d32 !important;background:#2e7d32 !important}
.wrong{border-color:#c62828 !important;background:#c62828 !important}
.buttons{margin-top:35px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
button{border:none;padding:14px 34px;border-radius:40px;font-size:18px;font-weight:bold;color:#fff;cursor:pointer}
.check{background:#009688}
.reset{background:#ff9800}
.score{margin-top:25px;text-align:center;font-size:30px;font-weight:bold;color:#0047ab}
@media(max-width:768px){
.grid{grid-template-columns:1fr 1fr}
.heading{font-size:22px}
button{width:100%}
.buttons{flex-direction:column}
}
</style>
</head>

<div class="buttons">
<button class="check" onclick="checkAnswers()">Check Answers</button>
<button class="reset" onclick="resetQuiz()">Reset</button>
</div>

<div class="score" id="score">Score: 0 / 2</div>

</div>

<script>

const boxes=document.querySelectorAll('.tick');

boxes.forEach(box=>{
box.addEventListener('click',()=>{
box.classList.toggle('active');
box.innerHTML=box.classList.contains('active')?'✓':'';
});
});

function checkAnswers(){
let score=0;
let incorrect=0;

boxes.forEach(box=>{

const correct=box.dataset.answer==="true";
const selected=box.classList.contains("active");

box.classList.remove("correct","wrong");

if(correct && selected){
box.classList.add("correct");
score++;
}
else if(!correct && selected){
box.classList.add("wrong");
incorrect++;
}
else if(correct && !selected){
incorrect++;
}

});

document.getElementById("score").innerText=`Score: ${score} / 2`;

alert(`✅ Correct Answers: ${score}\n❌ Incorrect Answers: ${incorrect}`);

}

function resetQuiz(){
boxes.forEach(box=>{
box.classList.remove("active","correct","wrong");
box.innerHTML="";
});
document.getElementById("score").innerText="Score: 0 / 2";
}

</script>
