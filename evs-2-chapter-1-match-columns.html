<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match the Columns</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#f5fbff,#fff5f9);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .worksheet{
      width:100%;
      max-width:1050px;
      background:#fff;
      border-radius:24px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.12);
      border:4px solid #58c7eb;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:30px;
    }

    .heading{
      color:#0ba5e8;
      font-size:34px;
      font-weight:bold;
      line-height:1.4;
    }

    .badge{
      background:#ef6b10;
      color:#fff;
      padding:8px 18px;
      border-radius:20px;
      font-size:15px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .match-area{
      display:flex;
      justify-content:space-between;
      gap:60px;
      position:relative;
      flex-wrap:wrap;
    }

    .column{
      flex:1;
      min-width:280px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .item{
      position:relative;
      padding:16px 22px;
      border-radius:14px;
      font-size:20px;
      background:#efd9ce;
      border:2px solid #b9b9b9;
      cursor:pointer;
      transition:0.3s;
      user-select:none;
    }

    .item:nth-child(even){
      background:#d5f0d8;
    }

    .right .item{
      background:#f3d7c7;
    }

    .right .item:nth-child(even){
      background:#f4edd0;
    }

    .item:hover{
      transform:scale(1.03);
    }

    .item.selected{
      border:3px solid #0ba5e8;
      box-shadow:0 0 10px rgba(11,165,232,0.35);
    }

    .item.correct{
      border:3px solid #1f8f3b;
      background:#cbf4d0 !important;
      color:#145b25;
    }

    .item.wrong{
      border:3px solid #d62828;
      background:#ffd9d9 !important;
      color:#9f0000;
    }

    .dot{
      width:18px;
      height:18px;
      border-radius:50%;
      background:#f3f3f3;
      border:2px solid #aaa;
      position:absolute;
      top:50%;
      transform:translateY(-50%);
    }

    .left .dot{
      right:-10px;
    }

    .right .dot{
      left:-10px;
    }

    .controls{
      text-align:center;
      margin-top:35px;
    }

    button{
      border:none;
      padding:14px 28px;
      border-radius:30px;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
      margin:6px;
      color:#fff;
      box-shadow:0 5px 12px rgba(0,0,0,0.2);
    }

    .reset-btn{
      background:#ff9800;
    }

    .result{
      margin-top:25px;
      text-align:center;
      font-size:28px;
      color:#0d47a1;
      font-weight:bold;
    }

    @media(max-width:850px){

      .match-area{
        flex-direction:column;
        gap:25px;
      }

      .heading{
        font-size:26px;
      }

      .item{
        font-size:18px;
      }

    }

  </style>
</head>

<body>

<div class="worksheet">

  <div class="top-bar">

    <div class="heading">
      D. Each part of our body has a work to do.<br>
      Match the columns to find out what they do.
    </div>

    <div class="badge">
      EVALUATION
    </div>

  </div>

  <div class="match-area">

    <!-- LEFT COLUMN -->
    <div class="column left">

      <div class="item" data-match="thinking">
        Brain
        <div class="dot"></div>
      </div>

      <div class="item" data-match="pumps blood">
        Heart
        <div class="dot"></div>
      </div>

      <div class="item" data-match="breathe in and out">
        Lungs
        <div class="dot"></div>
      </div>

      <div class="item" data-match="digests food">
        Stomach
        <div class="dot"></div>
      </div>

      <div class="item" data-match="gives shape to our body">
        Bones
        <div class="dot"></div>
      </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="column right">

      <div class="item" data-value="gives shape to our body">
        gives shape to our body
        <div class="dot"></div>
      </div>

      <div class="item" data-value="thinking">
        thinking
        <div class="dot"></div>
      </div>

      <div class="item" data-value="pumps blood">
        pumps blood
        <div class="dot"></div>
      </div>

      <div class="item" data-value="breathe in and out">
        breathe in and out
        <div class="dot"></div>
      </div>

      <div class="item" data-value="digests food">
        digests food
        <div class="dot"></div>
      </div>

    </div>

  </div>

  <div class="controls">

    <button class="reset-btn" onclick="resetGame()">
      Reset
    </button>

  </div>

  <div class="result" id="result">
    Score : 0 / 5
  </div>

</div>

<script>

let selectedLeft = null;
let score = 0;

const leftItems = document.querySelectorAll(".left .item");
const rightItems = document.querySelectorAll(".right .item");

leftItems.forEach((left)=>{

  left.addEventListener("click",()=>{

    if(left.classList.contains("correct")) return;

    leftItems.forEach(item=>item.classList.remove("selected"));

    left.classList.add("selected");
    selectedLeft = left;

  });

});

rightItems.forEach((right)=>{

  right.addEventListener("click",()=>{

    if(!selectedLeft) return;

    if(right.classList.contains("correct")) return;

    const leftAnswer = selectedLeft.dataset.match;
    const rightValue = right.dataset.value;

    if(leftAnswer === rightValue){

      selectedLeft.classList.add("correct");
      right.classList.add("correct");

      score++;

    }else{

      selectedLeft.classList.add("wrong");
      right.classList.add("wrong");

      setTimeout(()=>{

        selectedLeft.classList.remove("wrong");
        right.classList.remove("wrong");

      },800);

    }

    selectedLeft.classList.remove("selected");
    selectedLeft = null;

    document.getElementById("result").innerText =
      `Score : ${score} / 5`;

    if(score === 5){

      setTimeout(()=>{

        alert("Excellent! All matches are correct.");

      },300);

    }

  });

});

function resetGame(){

  score = 0;

  document.getElementById("result").innerText =
    "Score : 0 / 5";

  document.querySelectorAll(".item").forEach((item)=>{

    item.classList.remove("correct");
    item.classList.remove("wrong");
    item.classList.remove("selected");

  });

  selectedLeft = null;

}

</script>

</body>
</html>
