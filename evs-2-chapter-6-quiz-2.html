<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match the Following</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:1100px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.heading{
font-size:34px;
font-weight:bold;
color:#00a0d2;
}

.badge{
background:#ff7a00;
color:white;
padding:10px 20px;
font-weight:bold;
border-radius:6px;
}

.match-container{
display:grid;
grid-template-columns:1fr 250px 1fr;
gap:20px;
align-items:center;
}

.left-column,
.right-column{
display:flex;
flex-direction:column;
gap:18px;
}

.image-box{
background:#fff;
border-radius:12px;
overflow:hidden;
border:2px solid #ddd;
cursor:pointer;
transition:0.3s;
}

.image-box img{
width:100%;
height:140px;
object-fit:cover;
display:block;
}

.image-box.selected{
outline:4px solid #3b82f6;
}

.image-box.correct{
outline:4px solid #22c55e;
}

.image-box.wrong{
outline:4px solid #ef4444;
}

.center-column{
display:flex;
flex-direction:column;
gap:18px;
}

.label-box{
background:#e9ffe8;
border:2px solid #b9d7b8;
padding:18px;
text-align:center;
border-radius:12px;
font-size:28px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

.label-box:nth-child(even){
background:#fff9d9;
}

.label-box:hover{
transform:scale(1.03);
}

.label-box.correct{
background:#bbf7d0;
border-color:#22c55e;
}

.label-box.wrong{
background:#fecaca;
border-color:#ef4444;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px 30px;
font-size:20px;
font-weight:bold;
border-radius:30px;
cursor:pointer;
color:white;
}

.reset-btn{
background:#1565d8;
}

.score{
margin-top:25px;
text-align:center;
font-size:36px;
font-weight:bold;
color:#0b45a0;
}

@media(max-width:900px){

.match-container{
grid-template-columns:1fr;
}

.heading{
font-size:26px;
}

.label-box{
font-size:22px;
}

}

</style>

</head>

<div class="buttons">

<button class="reset-btn" onclick="resetGame()">
Reset
</button>

</div>

<div class="score" id="score">
Score: 0 / 6
</div>

</div>

<script>

let selectedImage = null;
let score = 0;
let totalSelected = 0;

function selectImage(image){

if(image.classList.contains('correct')) return;

document.querySelectorAll('.image-box').forEach(img=>{

img.classList.remove('selected');

});

image.classList.add('selected');

selectedImage = image;

}

function matchLabel(label){

if(!selectedImage) return;

if(label.classList.contains('correct')) return;

const correctAnswer = selectedImage.dataset.match;
const selectedLabel = label.dataset.name;

selectedImage.classList.remove('selected');

totalSelected++;

if(correctAnswer === selectedLabel){

selectedImage.classList.add('correct');
label.classList.add('correct');

score++;

}else{

selectedImage.classList.add('wrong');
label.classList.add('wrong');

setTimeout(()=>{

selectedImage.classList.remove('wrong');
label.classList.remove('wrong');

},800);

}

document.getElementById('score').innerHTML =
`Score: ${score} / 6`;

selectedImage = null;

/* FINAL RESULT ALERT */

if(totalSelected === 6){

let incorrect = 6 - score;

setTimeout(()=>{

alert(
`✅ Correct: ${score}\n❌ Incorrect: ${incorrect}`
);

},300);

}

}

function resetGame(){

score = 0;
totalSelected = 0;

selectedImage = null;

document.querySelectorAll('.image-box').forEach(img=>{

img.classList.remove('selected');
img.classList.remove('correct');
img.classList.remove('wrong');

});

document.querySelectorAll('.label-box').forEach(label=>{

label.classList.remove('correct');
label.classList.remove('wrong');

});

document.getElementById('score').innerHTML =
'Score: 0 / 6';

}

</script>
