<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Circle the Things You Get From Plants</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#eaf9ff,#ffffff,#eefbf0);
overflow-x:hidden;
}

.quiz-box{
width:100%;
max-width:1100px;
background:#fff;
border:5px solid #00b8f0;
border-radius:30px;
padding:30px 28px 40px;
position:relative;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

/* FLOATING SHAPES */

.quiz-box::before{
content:"";
position:absolute;
top:-70px;
right:-70px;
width:220px;
height:220px;
background:rgba(0,184,240,0.08);
border-radius:50%;
animation:floatOne 8s ease-in-out infinite;
}

.quiz-box::after{
content:"";
position:absolute;
bottom:-70px;
left:-70px;
width:220px;
height:220px;
background:rgba(255,64,129,0.08);
border-radius:50%;
animation:floatTwo 10s ease-in-out infinite;
}

/* HEADER */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
position:relative;
z-index:2;
gap:15px;
}

.heading{
font-size:30px;
font-weight:700;
color:#00a8e8;
line-height:1.5;
}

.badge{
background:#00a3b4;
color:#fff;
padding:8px 18px;
font-size:16px;
font-weight:700;
border-radius:8px;
animation:pulse 2s infinite;
white-space:nowrap;
}

/* NOTE */

.instruction{
font-size:20px;
font-weight:600;
color:#ff4fa0;
margin-bottom:30px;
position:relative;
z-index:2;
animation:pulseText 2s infinite;
}

/* WORD AREA */

.word-area{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:34px 48px;
position:relative;
z-index:2;
margin-top:20px;
}

/* WORD */

.word{
position:relative;
font-size:34px;
font-weight:600;
color:#333;
cursor:pointer;
padding:10px 18px;
transition:0.3s;
user-select:none;
display:inline-block;
}

.word:hover{
transform:scale(1.08);
color:#0096c7;
}

/* HAND DRAWN SVG */

.word svg{
position:absolute;
top:-20px;
left:-22px;
width:calc(100% + 44px);
height:calc(100% + 40px);
pointer-events:none;
display:none;
overflow:visible;
}

.word.circled svg{
display:block;
animation:drawCircle 0.4s ease;
}

/* CORRECT */

.word.correct path{
stroke:#2e7d32;
}

/* WRONG */

.word.wrong path{
stroke:#c62828;
}

/* BUTTONS */

.button-area{
text-align:center;
margin-top:45px;
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
position:relative;
z-index:2;
}

.check-btn,
.reset-btn{
border:none;
padding:14px 34px;
border-radius:40px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.35s;
color:#fff;
}

.check-btn{
background:linear-gradient(135deg,#00b894,#009688);
box-shadow:0 8px 18px rgba(0,150,136,0.35);
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
box-shadow:0 8px 18px rgba(255,152,0,0.35);
}

.check-btn:hover,
.reset-btn:hover{
transform:translateY(-3px) scale(1.05);
}

/* SCORE */

.score{
margin-top:28px;
text-align:center;
font-size:34px;
font-weight:700;
color:#0047ab;
position:relative;
z-index:2;
}

/* ANIMATIONS */

@keyframes drawCircle{

from{
transform:scale(0.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

@keyframes pulseText{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

@keyframes floatOne{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(15px);
}

100%{
transform:translateY(0px);
}

}

@keyframes floatTwo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0px);
}

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
align-items:flex-start;
}

.quiz-box{
padding:20px 14px 30px;
border-radius:22px;
}

.top-bar{
flex-direction:column;
align-items:flex-start;
}

.heading{
font-size:22px;
}

.badge{
font-size:13px;
padding:6px 12px;
}

.instruction{
font-size:15px;
line-height:1.6;
margin-bottom:20px;
}

.word-area{
gap:24px;
}

.word{
font-size:24px;
padding:8px 12px;
}

.score{
font-size:24px;
}

.button-area{
flex-direction:column;
}

.check-btn,
.reset-btn{
width:100%;
font-size:15px;
padding:13px 16px;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="top-bar">

<div class="heading">
B. Circle the things you get from plants.
</div>

<div class="badge">
CRITICAL THINKING
</div>

</div>

<div class="instruction">
🖱️ Click on the text to draw a circle around it.
</div>

<div class="word-area">

<div class="word" data-answer="true">
Cotton
<svg viewBox="0 0 220 90">
<path
d="M20 45 C20 10, 200 10, 200 45 C200 80, 20 80, 20 45Z"
fill="none"
stroke="#ff4fa0"
stroke-width="6"
/>
</svg>
</div>

<div class="word" data-answer="false">
Wool
<svg viewBox="0 0 220 90">
<path
d="M20 45 C20 10, 200 10, 200 45 C200 80, 20 80, 20 45Z"
fill="none"
stroke="#ff4fa0"
stroke-width="6"
/>
</svg>
</div>

<div class="word" data-answer="false">
Silk
<svg viewBox="0 0 220 90">
<path
d="M20 45 C20 10, 200 10, 200 45 C200 80, 20 80, 20 45Z"
fill="none"
stroke="#ff4fa0"
stroke-width="6"
/>
</svg>
</div>

<div class="word" data-answer="true">
Furniture
<svg viewBox="0 0 260 90">
<path
d="M20 45 C20 10, 240 10, 240 45 C240 80, 20 80, 20 45Z"
fill="none"
stroke="#ff4fa0"
stroke-width="6"
/>
</svg>
</div>

<div class="word" data-answer="true">
Fruits
<svg viewBox="0 0 220 90">
<path
d="M20 45 C20 10, 200 10, 200 45 C200 80, 20 80, 20 45Z"
fill="none"
stroke="#ff4fa0"
stroke-width="6"
/>
</svg>
</div>

<div class="word" data-answer="true">
Rice
<svg viewBox="0 0 220 90">
<path
d="M20 45 C20 10, 200 10, 200 45 C200 80, 20 80, 20 45Z"
fill="none"
stroke="#ff4fa0"
stroke-width="6"
/>
</svg>
</div>

<div class="word" data-answer="false">
Plastic bottle
<svg viewBox="0 0 320 90">
<path
d="M20 45 C20 10, 300 10, 300 45 C300 80, 20 80, 20 45Z"
fill="none"
stroke="#ff4fa0"
stroke-width="6"
/>
</svg>
</div>

<div class="word" data-answer="false">
Mobile phone
<svg viewBox="0 0 320 90">
<path
d="M20 45 C20 10, 300 10, 300 45 C300 80, 20 80, 20 45Z"
fill="none"
stroke="#ff4fa0"
stroke-width="6"
/>
</svg>
</div>

</div>

<div class="button-area">

<button class="check-btn" onclick="checkAnswers()">
Check Answers
</button>

<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>

</div>

<div class="score" id="score">
Score: 0 / 4
</div>

</div>

<script>

const words = document.querySelectorAll(".word");

words.forEach(word=>{

word.addEventListener("click",()=>{

word.classList.toggle("circled");

});

});

function checkAnswers(){

let score = 0;

words.forEach(word=>{

const correct =
word.dataset.answer === "true";

const selected =
word.classList.contains("circled");

word.classList.remove("correct","wrong");

if(correct && selected){

word.classList.add("correct");

score++;

}

else if(!correct && selected){

word.classList.add("wrong");

}

});

document.getElementById("score").innerText =
`Score: ${score} / 4`;

if(score === 4){

setTimeout(()=>{

alert("🎉 Excellent! All correct words circled.");

},300);

}

}

function resetQuiz(){

words.forEach(word=>{

word.classList.remove(
"circled",
"correct",
"wrong"
);

});

document.getElementById("score").innerText =
"Score: 0 / 4";

}

</script>

</body>
</html>
