<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tick – Which Have Air?</title>
  <style>
    *,::before,::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:ui-sans-serif,system-ui,sans-serif;background:#eff6ff;min-height:100vh;padding:1.5rem;color:#1f2937}
    .page{max-width:820px;margin:0 auto;background:white;border-radius:1rem;box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1);overflow:hidden}
    .header{background:white;padding:1.1rem 1.8rem .9rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #e5e7eb;flex-wrap:wrap;gap:.5rem}
    .header h1{font-size:1.05rem;font-weight:800;color:#1d4ed8}
    .badge{background:#f97316;color:white;padding:.28rem 1.1rem;font-size:.78rem;font-weight:700;letter-spacing:.08em;border-radius:3px;white-space:nowrap}
    .game-area{padding:1.5rem 2rem 2rem}
    #instruction-text{color:#6b7280;font-size:.88rem;font-weight:500;text-align:center;margin-bottom:1.2rem}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}
    .img-card{position:relative;border:3px solid #e5e7eb;border-radius:.85rem;overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s;user-select:none;background:#f9fafb}
    .img-card:hover{border-color:#93c5fd;box-shadow:0 4px 12px rgba(0,0,0,.12)}
    .img-card.selected{border-color:#16a34a;box-shadow:0 0 0 3px #bbf7d0}
    .img-card.wrong{border-color:#ef4444;box-shadow:0 0 0 3px #fecaca}
    .img-card.missed{border-color:#f59e0b;box-shadow:0 0 0 3px #fde68a}
    .img-card img{width:100%;height:160px;object-fit:cover;display:block}
    .tick-box{position:absolute;bottom:8px;right:8px;width:28px;height:28px;border:2.5px solid #e879a0;background:white;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;transition:all .15s}
    .img-card.selected .tick-box{border-color:#16a34a;background:#dcfce7;color:#16a34a}
    .img-card.wrong    .tick-box{border-color:#ef4444;background:#fee2e2;color:#ef4444}
    .img-card.missed   .tick-box{border-color:#f59e0b;background:#fef3c7;color:#f59e0b}
    .controls{margin-top:1.5rem;text-align:center;border-top:1px solid #f3f4f6;padding-top:1.5rem;display:flex;flex-direction:column;align-items:center;gap:.75rem}
    .btn-row{display:flex;gap:1rem}
    .btn{font-family:inherit;font-size:1rem;font-weight:700;padding:.6rem 1.4rem;border-radius:.5rem;border:none;cursor:pointer;transition:background .15s}
    .btn-clear{background:#e5e7eb;color:#374151}.btn-clear:hover{background:#d1d5db}
    .btn-check{background:#3b82f6;color:white;box-shadow:0 4px 6px -1px rgba(0,0,0,.1)}.btn-check:hover{background:#2563eb}
    #results-area{font-size:1.2rem;font-weight:700;display:none;margin-top:.5rem}
    .score-perfect{color:#16a34a}.score-partial{color:#ef4444}
    #retry-btn{background:none;border:none;color:#3b82f6;text-decoration:underline;cursor:pointer;font-size:.95rem;font-family:inherit;display:none}
    #retry-btn:hover{color:#1d4ed8}
    @media(max-width:520px){.grid{grid-template-columns:repeat(2,1fr)}.img-card img{height:120px}.header h1{font-size:.88rem}}
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>B.&nbsp;&nbsp;Tick (&#10003;) the pictures. Which have air in them?</h1>
    <span class="badge">EVALUATION</span>
  </div>
  <div class="game-area">
    <p id="instruction-text">Click on the pictures that have air in them.</p>
    <div class="grid" id="grid"></div>
    <div class="controls">
      <div class="btn-row">
        <button class="btn btn-clear" onclick="clearAll()">Clear All</button>
        <button class="btn btn-check" onclick="checkAnswers()">Check Answers</button>
      </div>
      <div id="results-area"></div>
      <button id="retry-btn" onclick="clearAll()">Try Again</button>
    </div>
  </div>
</div>

// Correct: balloons ✓ (air inside), football ✓ (air inside), tyre ✓ (air inside)
// Wrong:   screwdrivers ✗, monitor ✗, armchair ✗
const items=[
  {id:"balloons",     correct:true },
  {id:"screwdrivers", correct:false},
  {id:"football",     correct:true },
  {id:"monitor",      correct:false},
  {id:"tyre",         correct:true },
  {id:"armchair",     correct:false},
];
let selected=new Set(), evaluated=false;

function initGame(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  items.forEach(item=>{
    const card=document.createElement("div");
    card.className="img-card";
    card.id="card-"+item.id;
    card.onclick=()=>toggleSelect(item.id);
    card.innerHTML=`<img src="${IMGS[item.id]}" alt="${item.id}"><div class="tick-box" id="tick-${item.id}"></div>`;
    grid.appendChild(card);
  });
}

function toggleSelect(id){
  if(evaluated)return;
  const card=document.getElementById("card-"+id);
  const tick=document.getElementById("tick-"+id);
  if(selected.has(id)){selected.delete(id);card.classList.remove("selected");tick.textContent="";}
  else{selected.add(id);card.classList.add("selected");tick.textContent="✓";}
}

function clearAll(){
  selected.clear();evaluated=false;
  items.forEach(i=>{
    document.getElementById("card-"+i.id).classList.remove("selected","wrong","missed");
    document.getElementById("tick-"+i.id).textContent="";
  });
  document.getElementById("results-area").style.display="none";
  document.getElementById("retry-btn").style.display="none";
  document.getElementById("instruction-text").innerText="Click on the pictures that have air in them.";
}

function checkAnswers(){
  const instrEl=document.getElementById("instruction-text");
  if(selected.size===0){instrEl.innerHTML='<span style="color:#f97316;font-weight:700;">Please select at least one picture!</span>';return;}
  evaluated=true;
  let correct=0;
  const total=items.filter(i=>i.correct).length;
  items.forEach(item=>{
    const card=document.getElementById("card-"+item.id);
    const tick=document.getElementById("tick-"+item.id);
    const isSel=selected.has(item.id);
    card.classList.remove("selected","wrong","missed");
    if(isSel&&item.correct){card.classList.add("selected");tick.textContent="✓";correct++;}
    else if(isSel&&!item.correct){card.classList.add("wrong");tick.textContent="✗";}
    else if(!isSel&&item.correct){card.classList.add("missed");tick.textContent="?";}
  });
  const res=document.getElementById("results-area");
  res.style.display="block";
  document.getElementById("retry-btn").style.display="inline";
  instrEl.innerText="Green ✓ = correct | Red ✗ = wrong | Yellow ? = missed";
  res.innerHTML=(correct===total&&selected.size===total)
    ?`<span class="score-perfect">Perfect! All ${total} correct! 🌟</span>`
    :`<span class="score-partial">You got ${correct} of ${total} correct. Try again!</span>`;
}
window.onload=initGame;
</script>
