<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Body Parts Quiz</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#f8fbff,#fff4f8);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .quiz-container{
      width:100%;
      max-width:950px;
      background:#fff;
      border-radius:24px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.12);
      border:4px solid #55c3e8;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      flex-wrap:wrap;
      gap:10px;
    }

    .title{
      color:#0d9fe6;
      font-size:32px;
      font-weight:bold;
    }

    .badge{
      background:#d83d98;
      color:#fff;
      padding:8px 16px;
      border-radius:20px;
      font-size:15px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .instruction{
      color:#0d9fe6;
      font-size:26px;
      font-weight:bold;
      margin-bottom:25px;
    }

    .question-box{
      background:#f7fcff;
      border:2px solid #b8ebff;
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
    }

    .question{
      font-size:24px;
      color:#222;
      margin-bottom:18px;
      line-height:1.5;
      font-weight:600;
    }

    .options{
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .option{
      border:2px solid #ff4ba0;
      border-radius:14px;
      padding:14px;
      background:#fff;
      cursor:pointer;
      transition:0.3s;
      font-size:21px;
      text-align:left;
    }

    .option:hover{
      transform:scale(1.03);
      background:#eef9ff;
    }

    .option.correct{
      background:#c9f7cf;
      border-color:#1f8f3b;
      color:#116227;
      font-weight:bold;
    }

    .option.wrong{
      background:#ffd4d4;
      border-color:#c62828;
      color:#a30000;
      font-weight:bold;
    }

    .result{
      margin-top:25px;
      text-align:center;
      font-size:28px;
      color:#0d47a1;
      font-weight:bold;
    }

    .btn-area{
      text-align:center;
      margin-top:20px;
    }

    .reset-btn{
      background:#ff9800;
      color:white;
      border:none;
      padding:14px 30px;
      border-radius:30px;
      font-size:20px;
      cursor:pointer;
      font-weight:bold;
      box-shadow:0 5px 12px rgba(0,0,0,0.2);
    }

    .reset-btn:hover{
      background:#f57c00;
    }

    @media(max-width:600px){

      .quiz-container{
        padding:18px;
      }

      .title{
        font-size:26px;
      }

      .instruction{
        font-size:22px;
      }

      .question{
        font-size:20px;
      }

      .option{
        font-size:18px;
      }
    }
  </style>
</head>

<body>

<div class="quiz-container">

  <div class="top-bar">
    <div class="title">Body Parts Quiz</div>
    <div class="badge">DECISION MAKING</div>
  </div>

  <div class="instruction">
    A. Tick (✓) the correct option.
  </div>

  <div id="quiz"></div>

  <div class="result" id="result">
    Score : 0 / 5
  </div>

  <div class="btn-area">
    <button class="reset-btn" onclick="resetQuiz()">
      Reset Quiz
    </button>
  </div>

</div>

<script>

const questions = [

  {
    question : "1. Which body part helps us to hear sound?",
    options : [
      "i. Nose",
      "ii. Ears",
      "iii. Tongue"
    ],
    answer : "ii. Ears"
  },

  {
    question : "2. What is the function of heart?",
    options : [
      "i. To pump blood",
      "ii. To digest food",
      "iii. For breathing"
    ],
    answer : "i. To pump blood"
  },

  {
    question : "3. Which part of our body helps us to think?",
    options : [
      "i. Brain",
      "ii. Heart",
      "iii. Stomach"
    ],
    answer : "i. Brain"
  },

  {
    question : "4. Which body part provides shape to the body?",
    options : [
      "i. Heart",
      "ii. Bones",
      "iii. Lungs"
    ],
    answer : "ii. Bones"
  },

  {
    question : "5. The body parts that can be seen are known as",
    options : [
      "i. External Organs",
      "ii. Internal Organs",
      "iii. Receptors"
    ],
    answer : "i. External Organs"
  }

];

let score = 0;
let answered = 0;

function loadQuiz(){

  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  questions.forEach((q)=>{

    const questionBox = document.createElement("div");
    questionBox.className = "question-box";

    const question = document.createElement("div");
    question.className = "question";
    question.innerText = q.question;

    const options = document.createElement("div");
    options.className = "options";

    q.options.forEach((opt)=>{

      const btn = document.createElement("button");
      btn.className = "option";
      btn.innerText = opt;

      btn.onclick = ()=>checkAnswer(btn,opt,q.answer,options);

      options.appendChild(btn);

    });

    questionBox.appendChild(question);
    questionBox.appendChild(options);

    quiz.appendChild(questionBox);

  });

}

function checkAnswer(button,selected,correct,optionsDiv){

  const buttons = optionsDiv.querySelectorAll(".option");

  buttons.forEach((btn)=>{

    btn.disabled = true;

    if(btn.innerText === correct){
      btn.classList.add("correct");
    }

  });

  if(selected === correct){

    score++;

  }else{

    button.classList.add("wrong");

  }

  answered++;

  document.getElementById("result").innerText =
  `Score : ${score} / ${questions.length}`;

  if(answered === questions.length){

    setTimeout(()=>{

      alert(`Great Job! Your final score is ${score} out of ${questions.length}`);

    },300);

  }

}

function resetQuiz(){

  score = 0;
  answered = 0;

  document.getElementById("result").innerText =
  `Score : 0 / ${questions.length}`;

  loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
