<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Match the columns</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f4f4;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.quiz-box{
width:100%;
max-width:1100px;
background:#ffffff;
border-radius:28px;
padding:35px 30px 45px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
position:relative;
overflow:hidden;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
flex-wrap:wrap;
gap:12px;
}

.heading{
font-size:34px;
font-weight:700;
color:#00a6e6;
}

.badge{
background:#f57c00;
color:#fff;
padding:10px 24px;
font-size:18px;
font-weight:700;
clip-path:polygon(
0 0,
95% 0,
100% 50%,
95% 100%,
0 100%,
5% 50%
);
}

.match-wrapper{
position:relative;
display:flex;
justify-content:space-between;
gap:40px;
}

.column{
width:48%;
display:flex;
flex-direction:column;
gap:26px;
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
position:relative;
}

.card{
min-height:62px;
display:flex;
align-items:center;
padding:0 22px;
font-size:20px;
font-weight:500;
border-radius:0 30px 30px 0;
position:relative;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.left-card{
background:#f6c7b8;
width:78%;
border-radius:0 30px 30px 0;
}

.left-card.green{
background:#b9dfc9;
}

.right-card{
background:#b9dfc9;
width:78%;
justify-content:flex-start;
border-radius:30px 0 0 30px;
margin-left:auto;
}

.right-card.orange{
background:#f6c7b8;
}

.dot{
width:18px;
height:18px;
background:#fff;
border:2px solid #bdbdbd;
border-radius:50%;
cursor:pointer;
z-index:10;
transition:0.3s;
}

.left-dot{
margin-left:-10px;
}

.right-dot{
margin-right:-10px;
}

.dot.active{
background:#ff4fa0;
border-color:#ff4fa0;
transform:scale(1.15);
}

.dot.connected{
background:#009688;
border-color:#009688;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:visible;
z-index:1;
}

line{
stroke:#009688;
stroke-width:4;
stroke-linecap:round;
}

.result{
margin-top:35px;
text-align:center;
font-size:28px;
font-weight:700;
color:#0047ab;
}

.buttons{
text-align:center;
margin-top:22px;
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:#fff;
border:none;
padding:14px 34px;
border-radius:40px;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 18px rgba(255,152,0,0.35);
}

.reset-btn:hover{
transform:translateY(-2px) scale(1.05);
}

/* MOBILE */

@media(max-width:768px){

.quiz-box{
padding:20px 14px 28px;
border-radius:22px;
}

.top-bar{
margin-bottom:22px;
}

.heading{
font-size:24px;
}

.badge{
font-size:13px;
padding:8px 16px;
}

.match-wrapper{
gap:10px;
}

.column{
width:48%;
gap:18px;
}

.card{
font-size:14px;
padding:10px;
min-height:58px;
width:82%;
}

.dot{
width:15px;
height:15px;
}

.result{
font-size:22px;
margin-top:22px;
}

.reset-btn{
width:100%;
font-size:15px;
padding:13px 16px;
}

line{
stroke-width:3;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="top-bar">

<div class="heading">
B. Match the columns.
</div>

<div class="badge">
EVALUATION
</div>

</div>

<div class="match-wrapper" id="matchWrapper">

<svg id="svgLines"></svg>

<!-- LEFT -->

<div class="column">

<div class="item">

<div class="card left-card">
Eyes
</div>

<div class="dot left-dot" data-match="iv"></div>

</div>

<div class="item">

<div class="card left-card green">
Ears
</div>

<div class="dot left-dot" data-match="iii"></div>

</div>

<div class="item">

<div class="card left-card">
Nose
</div>

<div class="dot left-dot" data-match="i"></div>

</div>

<div class="item">

<div class="card left-card green">
Tongue
</div>

<div class="dot left-dot" data-match="v"></div>

</div>

<div class="item">

<div class="card left-card">
Skin
</div>

<div class="dot left-dot" data-match="ii"></div>

</div>

</div>

<!-- RIGHT -->

<div class="column">

<div class="item">

<div class="dot right-dot" data-id="i"></div>

<div class="card right-card">
smelling a bouquet
</div>

</div>

<div class="item">

<div class="dot right-dot" data-id="ii"></div>

<div class="card right-card orange">
touching hot iron
</div>

</div>

<div class="item">

<div class="dot right-dot" data-id="iii"></div>

<div class="card right-card">
hearing music
</div>

</div>

<div class="item">

<div class="dot right-dot" data-id="iv"></div>

<div class="card right-card orange">
reading a book
</div>

</div>

<div class="item">

<div class="dot right-dot" data-id="v"></div>

<div class="card right-card">
tasting food
</div>

</div>

</div>

</div>

<div class="result" id="result">
Score: 0 / 5
</div>

<div class="buttons">

<button class="reset-btn" onclick="resetGame()">
Reset
</button>

</div>

</div>

<script>

let selectedLeft = null;
let score = 0;
let totalMatched = 0;

const leftDots = document.querySelectorAll(".left-dot");
const rightDots = document.querySelectorAll(".right-dot");

const svg = document.getElementById("svgLines");

leftDots.forEach(dot=>{

dot.addEventListener("click",()=>{

if(dot.classList.contains("connected")) return;

leftDots.forEach(d=>d.classList.remove("active"));

selectedLeft = dot;

dot.classList.add("active");

});

});

rightDots.forEach(dot=>{

dot.addEventListener("click",()=>{

if(!selectedLeft) return;

if(dot.classList.contains("connected")) return;

drawLine(selectedLeft,dot);

const correctMatch = selectedLeft.dataset.match;
const selectedMatch = dot.dataset.id;

selectedLeft.classList.remove("active");

selectedLeft.classList.add("connected");

dot.classList.add("connected");

selectedLeft.style.pointerEvents = "none";
dot.style.pointerEvents = "none";

if(correctMatch === selectedMatch){
score++;
}

totalMatched++;

document.getElementById("result").innerText =
`Score: ${score} / 5`;

if(totalMatched === 5){

let incorrect = 5 - score;

setTimeout(()=>{

alert(
`✅ Correct Matches: ${score}\n❌ Incorrect Matches: ${incorrect}`
);

},300);

}

selectedLeft = null;

});

});

function drawLine(leftDot,rightDot){

const wrapper = document.getElementById("matchWrapper");

const wrapperRect = wrapper.getBoundingClientRect();

const leftRect = leftDot.getBoundingClientRect();
const rightRect = rightDot.getBoundingClientRect();

const x1 =
leftRect.left +
leftRect.width/2 -
wrapperRect.left;

const y1 =
leftRect.top +
leftRect.height/2 -
wrapperRect.top;

const x2 =
rightRect.left +
rightRect.width/2 -
wrapperRect.left;

const y2 =
rightRect.top +
rightRect.height/2 -
wrapperRect.top;

const line = document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);

line.setAttribute("x1",x1);
line.setAttribute("y1",y1);
line.setAttribute("x2",x2);
line.setAttribute("y2",y2);

svg.appendChild(line);

}

function resetGame(){

svg.innerHTML = "";

score = 0;
totalMatched = 0;

document.getElementById("result").innerText =
"Score: 0 / 5";

leftDots.forEach(dot=>{

dot.classList.remove("active","connected");

dot.style.pointerEvents = "auto";

});

rightDots.forEach(dot=>{

dot.classList.remove("connected");

dot.style.pointerEvents = "auto";

});

selectedLeft = null;

}

</script>

</body>
</html>
