<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match the Following – Communication Devices</title>
  <style>
    *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #eff6ff;
      min-height: 100vh;
      padding: 1rem 1rem 2rem;
      color: #1f2937;
    }
    .diamond {
      width: 16px; height: 16px;
      transform: rotate(45deg);
      background-color: white;
      border: 2px solid #ef4444;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative; z-index: 20;
    }
    .diamond:hover { transform: rotate(45deg) scale(1.3); box-shadow: 0 0 10px rgba(239,68,68,0.5); }
    .diamond.active { background-color: #ef4444; transform: rotate(45deg) scale(1.2); }
    .diamond.connected { background-color: #0d9488; border-color: #0d9488; }
    svg line { transition: stroke 0.3s ease; animation: drawLine 0.4s ease-out forwards; }
    @keyframes drawLine {
      from { stroke-dasharray: 1000; stroke-dashoffset: 1000; }
      to   { stroke-dasharray: 1000; stroke-dashoffset: 0; }
    }
    .disabled-overlay { position: absolute; inset: 0; z-index: 30; display: none; }
    .page { max-width: 64rem; margin: 0 auto; background: white; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: #3b82f6; color: white; padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.025em; }
    .badge { background: #f97316; color: white; padding: 0.25rem 1.5rem; font-size: 0.875rem; font-weight: 700; letter-spacing: 0.1em; border: 1px solid #fb923c; white-space: nowrap; }
    .instructions { text-align: center; color: #6b7280; margin-top: 1.5rem; padding: 0 1rem; font-weight: 500; font-size: 0.95rem; }
    .game-area { padding: 1.5rem 2rem; position: relative; }
    #lines-svg { position: absolute; inset: 0; pointer-events: none; width: 100%; height: 100%; z-index: 10; }
    .match-container { display: flex; justify-content: space-between; position: relative; }
    .col { width: 42%; display: flex; flex-direction: column; gap: 1.25rem; }
    .item-card {
      display: flex; align-items: center; justify-content: space-between;
      border: 2px solid #e5e7eb; border-radius: 1rem;
      padding: 0.5rem; background: white;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: border-color 0.15s; min-height: 80px;
    }
    .item-card.left:hover  { border-color: #93c5fd; }
    .item-card.right:hover { border-color: #fdba74; }
    .item-img { width: 6rem; height: 6rem; object-fit: contain; border-radius: 0.75rem; flex-shrink: 0; display: block; background: #f9fafb; }
    .item-label { flex-grow: 1; text-align: center; font-weight: 700; color: #374151; font-size: 1rem; padding: 0 0.5rem; }
    .dot-wrap-r { margin-right: -10px; flex-shrink: 0; }
    .dot-wrap-l { margin-left: -10px;  flex-shrink: 0; }
    .controls { margin-top: 3rem; text-align: center; border-top: 1px solid #f3f4f6; padding-top: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .btn-row { display: flex; gap: 1rem; }
    .btn { font-family: inherit; font-size: 1.125rem; font-weight: 700; padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; cursor: pointer; transition: background 0.15s; }
    .btn-clear { background: #e5e7eb; color: #374151; }
    .btn-clear:hover { background: #d1d5db; }
    .btn-check { background: #3b82f6; color: white; padding: 0.75rem 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .btn-check:hover { background: #2563eb; }
    #results-area { font-size: 1.5rem; font-weight: 700; margin-top: 1rem; display: none; }
    .score-perfect { color: #16a34a; }
    .score-partial  { color: #ef4444; }
    #retry-btn { background: none; border: none; color: #3b82f6; text-decoration: underline; cursor: pointer; font-size: 1rem; font-family: inherit; display: none; }
    #retry-btn:hover { color: #1d4ed8; }
    @media (max-width: 600px) {
      .item-img { width: 3.5rem; height: 3.5rem; }
      .item-label { font-size: 0.78rem; padding: 0 0.25rem; }
      .col { width: 44%; }
      .header h1 { font-size: 1.1rem; }
      .item-card { padding: 0.35rem; border-radius: 0.75rem; }
      .game-area { padding: 1rem; }
    }
    @media (max-width: 400px) {
      .item-img { width: 2.8rem; height: 2.8rem; }
      .item-label { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>Match the following.</h1>
    <span class="badge">EVALUATION</span>
  </div>
  <p class="instructions" id="instruction-text">
    Click the diamond next to an image, then click the diamond next to its matching word.
  </p>
  <div class="game-area">
    <svg id="lines-svg"></svg>
    <div id="blocker" class="disabled-overlay"></div>
    <div class="match-container" id="match-container">
      <div class="col" id="left-column"></div>
      <div class="col" id="right-column"></div>
    </div>
    <div class="controls">
      <div class="btn-row">
        <button class="btn btn-clear" onclick="clearLines()">Clear All</button>
        <button class="btn btn-check" onclick="checkAnswers()">Check Answers</button>
      </div>
      <div id="results-area"></div>
      <button id="retry-btn" onclick="resetGame()">Play Again</button>
    </div>
  </div>
</div>

];

const rightItems = [
  { id: 'w_radio',      label: 'i.',   word: 'radio'      },
  { id: 'w_letter',     label: 'ii.',  word: 'letter'     },
  { id: 'w_smartphone', label: 'iii.', word: 'smartphone' },
  { id: 'w_newspaper',  label: 'iv.',  word: 'newspaper'  }
];

const correctAnswers = {
  smartphone: 'w_smartphone',
  newspaper:  'w_newspaper',
  letter:     'w_letter',
  radio:      'w_radio'
};

let selectedLeft = null;
let connections  = {};
let isEvaluated  = false;

function initGame() {
  const leftCol  = document.getElementById('left-column');
  const rightCol = document.getElementById('right-column');
  leftCol.innerHTML  = '';
  rightCol.innerHTML = '';

  leftItems.forEach(item => {
    leftCol.insertAdjacentHTML('beforeend', `
      <div class="item-card left">
        <img class="item-img" src="${item.src}" alt="${item.id}">
        <span class="item-label">${item.label}</span>
        <div class="dot-wrap-r">
          <div class="diamond" id="dot-${item.id}" onclick="selectLeft('${item.id}')"></div>
        </div>
      </div>
    `);
  });

  rightItems.forEach(item => {
    rightCol.insertAdjacentHTML('beforeend', `
      <div class="item-card right">
        <div class="dot-wrap-l">
          <div class="diamond" id="dot-${item.id}" onclick="selectRight('${item.id}')"></div>
        </div>
        <span class="item-label" style="font-size:1.1rem;">${item.label}&nbsp;&nbsp;${item.word}</span>
      </div>
    `);
  });

  window.addEventListener('resize', () => drawLines());
}

function selectLeft(id) {
  if (isEvaluated) return;
  selectedLeft = (selectedLeft === id) ? null : id;
  updateDots();
}

function selectRight(rightId) {
  if (isEvaluated || !selectedLeft) return;
  for (let k in connections) {
    if (connections[k] === rightId) delete connections[k];
  }
  connections[selectedLeft] = rightId;
  selectedLeft = null;
  updateDots();
  drawLines();
}

function updateDots() {
  document.querySelectorAll('.diamond').forEach(d => d.classList.remove('active','connected'));
  if (selectedLeft) document.getElementById(`dot-${selectedLeft}`).classList.add('active');
  for (let lId in connections) {
    document.getElementById(`dot-${lId}`).classList.add('connected');
    document.getElementById(`dot-${connections[lId]}`).classList.add('connected');
  }
}

function drawLines(evalColors = null) {
  const svg = document.getElementById('lines-svg');
  const svgRect = svg.getBoundingClientRect();
  svg.innerHTML = '';
  for (let lId in connections) {
    let rId  = connections[lId];
    let dot1 = document.getElementById(`dot-${lId}`);
    let dot2 = document.getElementById(`dot-${rId}`);
    if (!dot1 || !dot2) continue;
    const r1 = dot1.getBoundingClientRect();
    const r2 = dot2.getBoundingClientRect();
    const x1 = r1.left + r1.width/2  - svgRect.left;
    const y1 = r1.top  + r1.height/2 - svgRect.top;
    const x2 = r2.left + r2.width/2  - svgRect.left;
    const y2 = r2.top  + r2.height/2 - svgRect.top;
    let color = '#0d9488';
    if (evalColors && evalColors[lId]) color = evalColors[lId] === 'correct' ? '#22c55e' : '#ef4444';
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '4');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  }
}

function clearLines() {
  if (isEvaluated) return;
  connections = {}; selectedLeft = null;
  updateDots(); drawLines();
}

function checkAnswers() {
  const instrEl   = document.getElementById('instruction-text');
  const resultsEl = document.getElementById('results-area');
  const retryBtn  = document.getElementById('retry-btn');
  if (Object.keys(connections).length < leftItems.length) {
    instrEl.innerHTML = '<span style="color:#f97316;font-weight:700;">Please connect all items before checking!</span>';
    return;
  }
  isEvaluated = true;
  document.getElementById('blocker').style.display = 'block';
  let score = 0, evalColors = {};
  leftItems.forEach(item => {
    if (connections[item.id] === correctAnswers[item.id]) { score++; evalColors[item.id] = 'correct'; }
    else evalColors[item.id] = 'incorrect';
  });
  drawLines(evalColors);
  resultsEl.style.display = 'block';
  retryBtn.style.display  = 'inline';
  instrEl.innerText = 'Here are your results!';
  if (score === leftItems.length)
    resultsEl.innerHTML = `<span class="score-perfect">Perfect Score! ${score}/${leftItems.length} 🌟</span>`;
  else
    resultsEl.innerHTML = `<span class="score-partial">You scored ${score} out of ${leftItems.length}. Keep practicing!</span>`;
}

function resetGame() {
  connections = {}; selectedLeft = null; isEvaluated = false;
  document.getElementById('blocker').style.display = 'none';
  document.getElementById('results-area').style.display = 'none';
  document.getElementById('retry-btn').style.display    = 'none';
  document.getElementById('instruction-text').innerText =
    'Click the diamond next to an image, then click the diamond next to its matching word.';
  updateDots(); drawLines();
}

window.onload = initGame;
</script>
