<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match the Following – Hygiene</title>
  <style>
    *,::before,::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:ui-sans-serif,system-ui,sans-serif;background:#eff6ff;min-height:100vh;padding:1rem 1rem 2rem;color:#1f2937}
    .diamond{width:16px;height:16px;transform:rotate(45deg);background-color:white;border:2px solid #ef4444;cursor:pointer;transition:all 0.2s ease;position:relative;z-index:20;flex-shrink:0}
    .diamond:hover{transform:rotate(45deg) scale(1.3);box-shadow:0 0 10px rgba(239,68,68,0.5)}
    .diamond.active{background-color:#ef4444;transform:rotate(45deg) scale(1.2)}
    .diamond.connected{background-color:#0d9488;border-color:#0d9488}
    svg.line-svg line{transition:stroke 0.3s ease;animation:drawLine 0.4s ease-out forwards}
    @keyframes drawLine{from{stroke-dasharray:1000;stroke-dashoffset:1000}to{stroke-dasharray:1000;stroke-dashoffset:0}}
    .disabled-overlay{position:absolute;inset:0;z-index:30;display:none}
    .page{max-width:860px;margin:0 auto;background:white;border-radius:1rem;box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1);overflow:hidden}
    .header{background:white;padding:1.1rem 1.8rem .9rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #e5e7eb;flex-wrap:wrap;gap:.5rem}
    .header h1{font-size:1.25rem;font-weight:800;color:#1d4ed8}
    .badge{background:#f97316;color:white;padding:.28rem 1.1rem;font-size:.78rem;font-weight:700;letter-spacing:.08em;border-radius:3px;white-space:nowrap}
    .instructions{text-align:center;color:#6b7280;padding:.75rem 1rem 0;font-size:.88rem;font-weight:500}
    .game-area{padding:1.2rem 1.5rem 1.5rem}
    svg.line-svg{position:absolute;inset:0;pointer-events:none;width:100%;height:100%;z-index:10}
    .match-container{display:flex;justify-content:space-between;gap:.5rem}
    .col{width:46%;display:flex;flex-direction:column;gap:.75rem}
    .item-card{display:flex;align-items:center;border:2px solid #e5e7eb;border-radius:.85rem;padding:.4rem .6rem;background:white;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:border-color .15s;gap:.4rem}
    .item-card.left:hover{border-color:#93c5fd}
    .item-card.right:hover{border-color:#fdba74}
    .animal-img{height:72px;width:auto;max-width:150px;object-fit:contain;border-radius:.5rem;flex-shrink:0}
    .dot-wrap-r{margin-right:-10px;flex-shrink:0;margin-left:auto;padding-left:4px}
    .dot-wrap-l{margin-left:-10px;flex-shrink:0;padding-right:4px}
    .controls{margin-top:2rem;text-align:center;border-top:1px solid #f3f4f6;padding-top:1.5rem;display:flex;flex-direction:column;align-items:center;gap:.75rem}
    .btn-row{display:flex;gap:1rem}
    .btn{font-family:inherit;font-size:1rem;font-weight:700;padding:.6rem 1.3rem;border-radius:.5rem;border:none;cursor:pointer;transition:background .15s}
    .btn-clear{background:#e5e7eb;color:#374151}
    .btn-clear:hover{background:#d1d5db}
    .btn-check{background:#3b82f6;color:white;box-shadow:0 4px 6px -1px rgba(0,0,0,.1)}
    .btn-check:hover{background:#2563eb}
    #results-area{font-size:1.35rem;font-weight:700;display:none}
    .score-perfect{color:#16a34a}
    .score-partial{color:#ef4444}
    #retry-btn{background:none;border:none;color:#3b82f6;text-decoration:underline;cursor:pointer;font-size:.95rem;font-family:inherit;display:none}
    #retry-btn:hover{color:#1d4ed8}
    @media(max-width:560px){.animal-img{height:54px}.col{gap:.5rem}.game-area{padding:.8rem}.header{padding:.85rem 1rem}.header h1{font-size:1rem}}
    @media(max-width:400px){.animal-img{height:44px}}
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>D.&nbsp; Match the following.</h1>
    <span class="badge">EVALUATION</span>
  </div>
  <p class="instructions" id="instruction-text">Click the diamond next to an image on the left, then click the diamond on the right to connect.</p>
  <div class="game-area">
    <div style="position:relative">
    <svg class="line-svg" id="lines-svg"></svg>
    <div id="blocker" class="disabled-overlay"></div>
    <div class="match-container">
      <div class="col" id="left-column"></div>
      <div class="col" id="right-column"></div>
    </div>
    </div><!-- end blocker wrapper -->
    <div class="controls">
      <div class="btn-row">
        <button class="btn btn-clear" onclick="clearLines()">Clear All</button>
        <button class="btn btn-check" onclick="checkAnswers()">Check Answers</button>
      </div>
      <div id="results-area"></div>
      <button id="retry-btn" onclick="resetGame()">Play Again</button>
    </div>
  </div>
</div>

};

// Correct matches: nails→nail clipper(Rc), teeth→toothbrush(Re), hair→comb(Rb), basin→baby(Ra), football→field(Rd)
const leftItems = [
  {id:'L1', correctRight:'Rc'},
  {id:'L2', correctRight:'Re'},
  {id:'L3', correctRight:'Rb'},
  {id:'L4', correctRight:'Ra'},
  {id:'L5', correctRight:'Rd'},
];
const rightItems = [{id:'Ra'},{id:'Rb'},{id:'Rc'},{id:'Rd'},{id:'Re'}];

let selectedLeft=null, connections={}, isEvaluated=false;

function initGame(){
  const lc=document.getElementById('left-column');
  const rc=document.getElementById('right-column');
  lc.innerHTML=rc.innerHTML='';
  leftItems.forEach(item=>{
    lc.insertAdjacentHTML('beforeend',`
      <div class="item-card left">
        <img class="animal-img" src="${IMGS[item.id]}" alt="${item.id}">
        <div class="dot-wrap-r"><div class="diamond" id="dot-${item.id}" onclick="selectLeft('${item.id}')"></div></div>
      </div>`);
  });
  rightItems.forEach(item=>{
    rc.insertAdjacentHTML('beforeend',`
      <div class="item-card right">
        <div class="dot-wrap-l"><div class="diamond" id="dot-${item.id}" onclick="selectRight('${item.id}')"></div></div>
        <img class="animal-img" src="${IMGS[item.id]}" alt="${item.id}">
      </div>`);
  });
  window.addEventListener('resize',()=>drawLines());
}
function selectLeft(id){if(isEvaluated)return;selectedLeft=(selectedLeft===id)?null:id;updateDots();}
function selectRight(rid){
  if(isEvaluated||!selectedLeft)return;
  for(let k in connections)if(connections[k]===rid)delete connections[k];
  connections[selectedLeft]=rid;selectedLeft=null;updateDots();drawLines();
}
function updateDots(){
  document.querySelectorAll('.diamond').forEach(d=>d.classList.remove('active','connected'));
  if(selectedLeft)document.getElementById(`dot-${selectedLeft}`).classList.add('active');
  for(let lid in connections){
    document.getElementById(`dot-${lid}`).classList.add('connected');
    document.getElementById(`dot-${connections[lid]}`).classList.add('connected');
  }
}
function drawLines(ec=null){
  const svg=document.getElementById('lines-svg');
  const sr=svg.getBoundingClientRect();
  svg.innerHTML='';
  for(let lid in connections){
    const rid=connections[lid];
    const d1=document.getElementById(`dot-${lid}`);
    const d2=document.getElementById(`dot-${rid}`);
    if(!d1||!d2)continue;
    const r1=d1.getBoundingClientRect(),r2=d2.getBoundingClientRect();
    let color='#0d9488';
    if(ec&&ec[lid])color=ec[lid]==='correct'?'#22c55e':'#ef4444';
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',r1.left+r1.width/2-sr.left);
    line.setAttribute('y1',r1.top+r1.height/2-sr.top);
    line.setAttribute('x2',r2.left+r2.width/2-sr.left);
    line.setAttribute('y2',r2.top+r2.height/2-sr.top);
    line.setAttribute('stroke',color);
    line.setAttribute('stroke-width','3.5');
    line.setAttribute('stroke-linecap','round');
    svg.appendChild(line);
  }
}
function clearLines(){
  connections={};selectedLeft=null;isEvaluated=false;
  document.getElementById('blocker').style.display='none';
  document.getElementById('results-area').style.display='none';
  document.getElementById('retry-btn').style.display='none';
  document.getElementById('instruction-text').innerText='Click the diamond next to an image on the left, then click the diamond on the right to connect.';
  updateDots();drawLines();
}
function checkAnswers(){
  const instrEl=document.getElementById('instruction-text');
  const resultsEl=document.getElementById('results-area');
  const retryBtn=document.getElementById('retry-btn');
  if(Object.keys(connections).length<leftItems.length){
    instrEl.innerHTML='<span style="color:#f97316;font-weight:700;">Please connect all 5 items before checking!</span>';
    return;
  }
  isEvaluated=true;
  document.getElementById('blocker').style.display='block';
  let score=0,ec={};
  leftItems.forEach(item=>{
    if(connections[item.id]===item.correctRight){score++;ec[item.id]='correct';}
    else ec[item.id]='incorrect';
  });
  drawLines(ec);
  resultsEl.style.display='block';retryBtn.style.display='inline';
  instrEl.innerText='Here are your results!';
  resultsEl.innerHTML=score===leftItems.length
    ?`<span class="score-perfect">Perfect Score! ${score}/${leftItems.length} 🌟</span>`
    :`<span class="score-partial">You scored ${score} out of ${leftItems.length}. Keep practicing!</span>`;
}
function resetGame(){
  connections={};selectedLeft=null;isEvaluated=false;
  document.getElementById('blocker').style.display='none';
  document.getElementById('results-area').style.display='none';
  document.getElementById('retry-btn').style.display='none';
  document.getElementById('instruction-text').innerText='Click the diamond next to an image on the left, then click the diamond on the right to connect.';
  updateDots();drawLines();
}
window.onload=initGame;
</script>
