<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Happy or Sad Face Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#eaf9ff,#ffffff,#eefbf0);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

.quiz-box{
width:100%;
max-width:1100px;
background:#f7f7f7;
border:5px solid #00b7ef;
border-radius:30px;
padding:35px 28px 40px;
position:relative;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
animation:fadeIn 0.8s ease;
}

/* FLOATING BACKGROUND */

.quiz-box::before{
content:"";
position:absolute;
top:-70px;
right:-70px;
width:230px;
height:230px;
background:rgba(0,183,239,0.08);
border-radius:50%;
animation:floatOne 8s ease-in-out infinite;
}

.quiz-box::after{
content:"";
position:absolute;
bottom:-70px;
left:-70px;
width:230px;
height:230px;
background:rgba(255,105,180,0.08);
border-radius:50%;
animation:floatTwo 10s ease-in-out infinite;
}

/* HEADING */

.heading{
font-size:30px;
font-weight:700;
color:#00a8e8;
margin-bottom:30px;
line-height:1.6;
position:relative;
z-index:2;
}

/* QUESTION BOX */

.question-box{
background:#ffffff;
border:2px solid #c8efff;
border-radius:22px;
padding:20px 22px;
margin-bottom:18px;
position:relative;
z-index:2;
transition:0.35s;
animation:fadeUp 0.6s ease;
}

.question-box:hover{
transform:translateY(-4px) scale(1.01);
box-shadow:0 12px 25px rgba(0,0,0,0.08);
}

/* QUESTION ROW */

.question-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
}

/* QUESTION */

.question{
font-size:24px;
font-weight:500;
color:#333;
line-height:1.7;
flex:1;
}

/* OPTIONS */

.options{
display:flex;
gap:18px;
}

.emoji-btn{
width:64px;
height:64px;
border:none;
border-radius:50%;
font-size:34px;
cursor:pointer;
background:#fff7d6;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
transition:all 0.3s ease;
}

.emoji-btn:hover{
transform:translateY(-4px) scale(1.08);
}

.emoji-btn.correct{
background:#d9f8d9;
animation:correctPulse 0.5s ease;
}

.emoji-btn.wrong{
background:#ffd9dd;
animation:wrongShake 0.4s ease;
}

/* SCORE */

.score{
margin-top:30px;
text-align:center;
font-size:34px;
font-weight:700;
color:#0047ab;
position:relative;
z-index:2;
}

/* RESET */

.button-area{
text-align:center;
margin-top:24px;
position:relative;
z-index:2;
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:#fff;
border:none;
padding:14px 40px;
border-radius:40px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.35s;
box-shadow:0 8px 18px rgba(255,152,0,0.35);
}

.reset-btn:hover{
transform:translateY(-3px) scale(1.05);
}

/* ANIMATIONS */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeIn{

from{
opacity:0;
}

to{
opacity:1;
}

}

@keyframes correctPulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.12);
}

100%{
transform:scale(1);
}

}

@keyframes wrongShake{

0%{
transform:translateX(0);
}

25%{
transform:translateX(-6px);
}

50%{
transform:translateX(6px);
}

75%{
transform:translateX(-4px);
}

100%{
transform:translateX(0);
}

}

@keyframes floatOne{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(15px);
}

100%{
transform:translateY(0px);
}

}

@keyframes floatTwo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0px);
}

}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
align-items:flex-start;
}

.quiz-box{
padding:20px 14px 28px;
border-radius:22px;
}

.heading{
font-size:22px;
margin-bottom:20px;
}

.question-box{
padding:16px;
}

.question-row{
flex-direction:column;
align-items:flex-start;
gap:16px;
}

.question{
font-size:17px;
line-height:1.7;
}

.options{
width:100%;
justify-content:flex-start;
}

.emoji-btn{
width:56px;
height:56px;
font-size:28px;
}

.score{
font-size:24px;
}

.reset-btn{
width:100%;
font-size:15px;
padding:13px 16px;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="heading">
3. Circle the happy face for true or the sad face for false statements.
</div>

<div id="quiz"></div>

<div class="score" id="score">
Score: 0 / 4
</div>

<div class="button-area">
<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>
</div>

</div>

<script>

const questions = [

{
question:"a. Weather stays the same for the whole year.",
answer:"sad"
},

{
question:"b. We can see lightning and hear thunder on a cold day.",
answer:"sad"
},

{
question:"c. Farmers love the rainy season for their crops.",
answer:"happy"
},

{
question:"d. We wear cotton clothes in winter.",
answer:"sad"
}

];

let score = 0;
let answered = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

quiz.innerHTML = "";

questions.forEach((q,index)=>{

const box = document.createElement("div");

box.className = "question-box";

box.style.animationDelay = `${index * 0.15}s`;

const row = document.createElement("div");

row.className = "question-row";

const question = document.createElement("div");

question.className = "question";

question.innerText = q.question;

row.appendChild(question);

const options = document.createElement("div");

options.className = "options";

/* HAPPY BUTTON */

const happyBtn = document.createElement("button");

happyBtn.className = "emoji-btn";

happyBtn.innerText = "🙂";

happyBtn.onclick = ()=>checkAnswer(happyBtn,"happy",q.answer,options);

/* SAD BUTTON */

const sadBtn = document.createElement("button");

sadBtn.className = "emoji-btn";

sadBtn.innerText = "☹️";

sadBtn.onclick = ()=>checkAnswer(sadBtn,"sad",q.answer,options);

options.appendChild(happyBtn);

options.appendChild(sadBtn);

row.appendChild(options);

box.appendChild(row);

quiz.appendChild(box);

});

}

function checkAnswer(button,selected,correctAnswer,optionsDiv){

const buttons = optionsDiv.querySelectorAll(".emoji-btn");

buttons.forEach(btn=>{

btn.disabled = true;

if(
(correctAnswer === "happy" && btn.innerText === "🙂") ||
(correctAnswer === "sad" && btn.innerText === "☹️")
){
btn.classList.add("correct");
}

});

if(selected === correctAnswer){

score++;

}else{

button.classList.add("wrong");

}

answered++;

document.getElementById("score").innerText =
`Score: ${score} / ${questions.length}`;

if(answered === questions.length){

let incorrect = questions.length - score;

setTimeout(()=>{

alert(
`😊 Correct Answers: ${score}\n☹️ Incorrect Answers: ${incorrect}`
);

},400);

}

}

function resetQuiz(){

score = 0;

answered = 0;

document.getElementById("score").innerText =
`Score: 0 / ${questions.length}`;

loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
