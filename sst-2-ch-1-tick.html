<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Understanding of the Chapter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.quiz-box{
width:100%;
max-width:950px;
background:#f7f7f7;
border-radius:22px;
padding:28px 22px 35px;
border:4px solid #00bdf2;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.top-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
gap:10px;
flex-wrap:wrap;
}

.top-header h1{
font-size:20px;
color:#d91c0f;
font-family:Georgia,serif;
font-weight:bold;
}

.badge{
background:#ff0000;
color:#fff;
padding:4px 14px;
font-size:14px;
font-weight:bold;
}

.sub-heading{
font-size:18px;
font-weight:bold;
color:#00a6d6;
margin-bottom:20px;
}

.question-box{
margin-bottom:18px;
}

.question{
font-size:16px;
font-family:Georgia,serif;
color:#333;
margin-bottom:10px;
line-height:1.6;
}

.options{
display:flex;
flex-wrap:wrap;
gap:12px;
padding-left:28px;
}

.option-btn{
background:#fff;
border:2px solid #ff4fa0;
border-radius:10px;
padding:10px 14px;
font-size:14px;
font-family:Georgia,serif;
cursor:pointer;
transition:0.3s;
min-width:190px;
text-align:left;
}

.option-btn:hover{
background:#fff5fa;
}

.option-btn.correct{
background:#c8f7c5;
border-color:#2e7d32;
color:#1b5e20;
font-weight:bold;
}

.option-btn.wrong{
background:#ffcdd2;
border-color:#c62828;
color:#b71c1c;
font-weight:bold;
}

.result{
margin-top:20px;
text-align:center;
font-size:20px;
font-weight:bold;
color:#003db8;
}

.buttons{
text-align:center;
margin-top:20px;
}

.reset-btn{
background:#ff9800;
color:#fff;
border:none;
padding:10px 28px;
border-radius:28px;
font-size:15px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.reset-btn:hover{
background:#f57c00;
}

@media(max-width:768px){

.options{
flex-direction:column;
padding-left:12px;
}

.option-btn{
width:100%;
min-width:100%;
}

.top-header h1{
font-size:18px;
}

.sub-heading{
font-size:16px;
}

.question{
font-size:15px;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="top-header">

<h1>
Understanding of the chapter
</h1>

<div class="badge">
Comprehension
</div>

</div>

<div class="sub-heading">
1. Tick (✓) the correct option.
</div>

<div id="quiz"></div>

<div class="result" id="result">
Score: 0 / 4
</div>

<div class="buttons">

<button class="reset-btn" onclick="resetQuiz()">
Reset Quiz
</button>

</div>

</div>

<script>

const questions = [

{
question:"a. A family consisting only of parents and their children is called a:",
options:[
"i. Joint family",
"ii. Nuclear family",
"iii. Family Tree"
],
answer:"ii. Nuclear family"
},

{
question:"b. Who are your 'primary caregivers' in a family?",
options:[
"i. Your cousins",
"ii. Your parents",
"iii. Your friends"
],
answer:"ii. Your parents"
},

{
question:"c. In a family tree, the 'roots' usually represent:",
options:[
"i. The youngest children",
"ii. The pets",
"iii. The oldest relatives (Grandparents)"
],
answer:"iii. The oldest relatives (Grandparents)"
},

{
question:"d. Children of your aunts and uncles are called your:",
options:[
"i. Siblings",
"ii. Cousins",
"iii. Grandparents"
],
answer:"ii. Cousins"
}

];

let score = 0;
let answered = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

quiz.innerHTML = "";

questions.forEach((q)=>{

const questionBox = document.createElement("div");

questionBox.className = "question-box";

const question = document.createElement("div");

question.className = "question";

question.innerText = q.question;

questionBox.appendChild(question);

const optionsDiv = document.createElement("div");

optionsDiv.className = "options";

q.options.forEach(option=>{

const button = document.createElement("button");

button.className = "option-btn";

button.innerText = option;

button.onclick = ()=>checkAnswer(button,option,q.answer,optionsDiv);

optionsDiv.appendChild(button);

});

questionBox.appendChild(optionsDiv);

quiz.appendChild(questionBox);

});

}

function checkAnswer(button,selected,correctAnswer,optionsDiv){

const allButtons = optionsDiv.querySelectorAll(".option-btn");

allButtons.forEach(btn=>{

btn.disabled = true;

if(btn.innerText === correctAnswer){

btn.classList.add("correct");

}

});

if(selected === correctAnswer){

score++;

}else{

button.classList.add("wrong");

}

answered++;

document.getElementById("result").innerText =
`Score: ${score} / ${questions.length}`;

if(answered === questions.length){

let incorrect = questions.length - score;

setTimeout(()=>{

alert(
`✅ Correct: ${score}\n❌ Incorrect: ${incorrect}`
);

},300);

}

}

function resetQuiz(){

score = 0;

answered = 0;

document.getElementById("result").innerText =
`Score: 0 / ${questions.length}`;

loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
