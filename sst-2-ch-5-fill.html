<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fill in the blanks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#dff6ff,#ffffff,#e8f5e9);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.quiz-box{
width:100%;
max-width:980px;
background:#ffffff;
border-radius:30px;
padding:35px 28px 40px;
border:5px solid #00b8f0;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
position:relative;
overflow:hidden;
}

.quiz-box::before{
content:"";
position:absolute;
top:-70px;
right:-70px;
width:220px;
height:220px;
background:rgba(0,184,240,0.08);
border-radius:50%;
}

.quiz-box::after{
content:"";
position:absolute;
bottom:-70px;
left:-70px;
width:220px;
height:220px;
background:rgba(255,64,129,0.08);
border-radius:50%;
}

.heading{
font-size:30px;
font-weight:700;
color:#00a6d6;
margin-bottom:24px;
position:relative;
z-index:2;
}

.word-box{
background:#ffe4ef;
display:inline-block;
padding:12px 24px;
border-radius:16px;
font-size:20px;
font-weight:600;
color:#8e24aa;
margin-bottom:30px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
position:relative;
z-index:2;
}

.question-box{
background:#f9fcff;
border:2px solid #c9efff;
border-radius:22px;
padding:22px;
margin-bottom:22px;
transition:0.3s;
position:relative;
z-index:2;
}

.question-box:hover{
transform:translateY(-3px);
box-shadow:0 10px 22px rgba(0,0,0,0.08);
}

.question{
font-size:22px;
font-weight:500;
color:#444;
line-height:1.9;
}

.blank-input{
width:180px;
border:none;
border-bottom:3px solid #888;
background:transparent;
font-size:20px;
font-weight:700;
color:#d81b60;
text-align:center;
outline:none;
padding:4px;
margin:0 5px;
transition:0.3s;
}

.blank-input:focus{
border-color:#00b8f0;
}

.blank-input.correct{
border-color:#2e7d32;
color:#1b5e20;
}

.blank-input.wrong{
border-color:#c62828;
color:#b71c1c;
}

.buttons{
text-align:center;
margin-top:28px;
position:relative;
z-index:2;
}

.check-btn,
.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:#fff;
border:none;
padding:14px 30px;
border-radius:40px;
font-size:17px;
font-weight:700;
cursor:pointer;
margin:8px;
transition:0.3s;
box-shadow:0 8px 18px rgba(255,152,0,0.3);
}

.check-btn:hover,
.reset-btn:hover{
transform:translateY(-2px) scale(1.04);
}

.result{
margin-top:22px;
text-align:center;
font-size:28px;
font-weight:700;
color:#0047ab;
position:relative;
z-index:2;
}

@media(max-width:768px){

body{
padding:12px;
align-items:flex-start;
}

.quiz-box{
padding:22px 16px 30px;
border-radius:22px;
}

.heading{
font-size:24px;
line-height:1.4;
}

.word-box{
font-size:16px;
padding:10px 16px;
line-height:1.6;
}

.question-box{
padding:16px;
border-radius:18px;
}

.question{
font-size:17px;
line-height:1.8;
}

.blank-input{
width:120px;
font-size:16px;
}

.result{
font-size:22px;
}

.check-btn,
.reset-btn{
width:100%;
font-size:16px;
padding:14px 18px;
margin:8px 0;
}

}

</style>
</head>

<body>

<div class="quiz-box">

<div class="heading">
2. Fill in the blanks.
</div>

<center>

<div class="word-box">
Purifier, Snow, Save, Farmers
</div>

</center>

<div class="question-box">

<div class="question">
a. In the mountains,
<input type="text" class="blank-input" id="q1">
melts to form small streams.
</div>

</div>

<div class="question-box">

<div class="question">
b. We use a water
<input type="text" class="blank-input" id="q2">
at home to make water safe for drinking.
</div>

</div>

<div class="question-box">

<div class="question">
c.
<input type="text" class="blank-input" id="q3">
use water to grow crops.
</div>

</div>

<div class="question-box">

<div class="question">
d. We must always remember to
<input type="text" class="blank-input" id="q4">
water and not waste it.
</div>

</div>

<div class="buttons">

<button class="check-btn" onclick="checkAnswers()">
Check Answers
</button>

<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>

</div>

<div class="result" id="result">
Score: 0 / 4
</div>

</div>

<script>

const answers = {

q1:"snow",
q2:"purifier",
q3:"farmers",
q4:"save"

};

function checkAnswers(){

let score = 0;

Object.keys(answers).forEach(id=>{

const input = document.getElementById(id);

const userAnswer = input.value.trim().toLowerCase();

const correctAnswer = answers[id];

input.classList.remove("correct","wrong");

if(userAnswer === correctAnswer){

input.classList.add("correct");

score++;

}else{

input.classList.add("wrong");

}

});

document.getElementById("result").innerText =
`Score: ${score} / 4`;

let incorrect = 4 - score;

setTimeout(()=>{

alert(
`✅ Correct Answers: ${score}\n❌ Incorrect Answers: ${incorrect}`
);

},300);

}

function resetQuiz(){

Object.keys(answers).forEach(id=>{

const input = document.getElementById(id);

input.value = "";

input.classList.remove("correct","wrong");

});

document.getElementById("result").innerText =
"Score: 0 / 4";

}

</script>

</body>
</html>
