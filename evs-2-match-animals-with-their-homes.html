        const animals = [
            { id: 'bird',  name: 'Bird',  img: 'https://upload.wikimedia.org/wikipedia/commons/9/97/Swallow-tailed_bee-eater_%28Merops_hirundineus_chrysolaimus%29.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original', correctHome: 'nest' },
            { id: 'snake', name: 'Snake', img: 'https://upload.wikimedia.org/wikipedia/commons/9/93/Coral_red_kukri_%28Oligodon_kheriensis%29_from_Cooch_Behar%2C_West_Bengal%2C_India.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original', correctHome: 'burrow' },
            { id: 'horse', name: 'Horse', img: 'https://upload.wikimedia.org/wikipedia/commons/d/de/Nokota_Horses_cropped.jpg', correctHome: 'barn' },
            { id: 'dog',   name: 'Dog',   img: 'https://upload.wikimedia.org/wikipedia/commons/2/26/YellowLabradorLooking_new.jpg', correctHome: 'doghouse' },
            { id: 'lion',  name: 'Lion',  img: 'https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg', correctHome: 'cave' }
        ];

        // Right side (Homes) ordered exactly like the visual worksheet
        const homes = [
            { id: 'doghouse', name: 'Doghouse', img: 'https://upload.wikimedia.org/wikipedia/commons/e/e5/Red_wooden_doghouse_in_Tuntorp_1.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original' },
            { id: 'cave',     name: 'Cave',     img: 'https://upload.wikimedia.org/wikipedia/commons/8/87/The_lower_Cave_on_Cave_Hill_-_geograph.org.uk_-_548361.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original' },
            { id: 'nest',     name: 'Nest',     img: 'https://upload.wikimedia.org/wikipedia/commons/9/92/Bocianie_gniazdo_w_Podolu%2C_%C5%9Awi%C4%99tokrzyskie%2C_20240629_1230_0067.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original' },
            { id: 'burrow',   name: 'Burrow',   img: 'https://upload.wikimedia.org/wikipedia/commons/c/cc/Rabbit_burrow_hole_in_Parco_Alto_Milanese_-_Legnano%2C_Lombardy%2C_Italy_2020-12-11.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original' },
            { id: 'barn',     name: 'Barn',     img: 'https://upload.wikimedia.org/wikipedia/commons/a/a8/Log_barn_WF4_6908.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original' }
        ];

        // State variables
        let selectedAnimal = null;
        let connections = {}; // Format: { animalId: homeId }
        let isEvaluated = false;

        // Render the UI
        function initGame() {
            const animalsCol = document.getElementById('animals-column');
            const homesCol = document.getElementById('homes-column');
            
            animalsCol.innerHTML = '';
            homesCol.innerHTML = '';

            animals.forEach(animal => {
                animalsCol.insertAdjacentHTML('beforeend', `
                    <div class="flex items-center justify-between border-2 border-gray-200 rounded-2xl p-2 bg-white shadow-sm hover:border-blue-300 transition-colors">
                        <img src="${animal.img}" alt="${animal.name}" onerror="this.onerror=null; this.src='https://placehold.co/400x300/e2e8f0/475569?text=${animal.name}';" referrerpolicy="no-referrer" class="w-24 h-24 md:w-32 md:h-32 object-cover rounded-xl" draggable="false">
                        <div class="flex-grow text-center font-bold text-gray-700 hidden sm:block">${animal.name}</div>
                        <!-- Connection Point -->
                        <div class="mr-[-10px]">
                            <div class="diamond animal-dot" id="dot-${animal.id}" onclick="selectAnimal('${animal.id}')"></div>
                        </div>
                    </div>
                `);
            });

            homes.forEach(home => {
                homesCol.insertAdjacentHTML('beforeend', `
                    <div class="flex items-center justify-between border-2 border-gray-200 rounded-2xl p-2 bg-white shadow-sm hover:border-orange-300 transition-colors">
                        <!-- Connection Point -->
                        <div class="ml-[-10px]">
                            <div class="diamond home-dot" id="dot-${home.id}" onclick="selectHome('${home.id}')"></div>
                        </div>
                        <div class="flex-grow text-center font-bold text-gray-700 hidden sm:block">${home.name}</div>
                        <img src="${home.img}" alt="${home.name}" onerror="this.onerror=null; this.src='https://placehold.co/400x300/e2e8f0/475569?text=${home.name}';" referrerpolicy="no-referrer" class="w-24 h-24 md:w-32 md:h-32 object-cover rounded-xl" draggable="false">
                    </div>
                `);
            });
            
            // Re-draw lines when window is resized
            window.addEventListener('resize', drawLines);
        }

        function selectAnimal(id) {
            if (isEvaluated) return;
            
            // If clicking the already selected one, deselect it
            if (selectedAnimal === id) {
                selectedAnimal = null;
            } else {
                selectedAnimal = id;
            }
            updateDotsUI();
        }

        function selectHome(homeId) {
            if (isEvaluated || !selectedAnimal) return;

            // Remove any existing connection that points to this home (ensures 1-to-1 match)
            for (let aId in connections) {
                if (connections[aId] === homeId) {
                    delete connections[aId];
                }
            }

            // Create the new connection
            connections[selectedAnimal] = homeId;
            selectedAnimal = null; // Reset selection
            
            updateDotsUI();
            drawLines();
        }

        function updateDotsUI() {
            // Reset all dots
            document.querySelectorAll('.diamond').forEach(dot => {
                dot.classList.remove('active', 'connected');
            });

            // Highlight selected animal
            if (selectedAnimal) {
                document.getElementById(`dot-${selectedAnimal}`).classList.add('active');
            }

            // Highlight connected dots
            for (let animalId in connections) {
                let homeId = connections[animalId];
                document.getElementById(`dot-${animalId}`).classList.add('connected');
                document.getElementById(`dot-${homeId}`).classList.add('connected');
            }
        }

        function drawLines(evaluationColors = null) {
            const svg = document.getElementById('lines-svg');
            const svgRect = svg.getBoundingClientRect();
            svg.innerHTML = ''; // Clear existing lines

            for (let animalId in connections) {
                let homeId = connections[animalId];
                
                const dot1 = document.getElementById(`dot-${animalId}`);
                const dot2 = document.getElementById(`dot-${homeId}`);
                
                if(!dot1 || !dot2) continue;

                const rect1 = dot1.getBoundingClientRect();
                const rect2 = dot2.getBoundingClientRect();

                // Calculate center points relative to the SVG container
                const x1 = rect1.left + rect1.width / 2 - svgRect.left;
                const y1 = rect1.top + rect1.height / 2 - svgRect.top;
                const x2 = rect2.left + rect2.width / 2 - svgRect.left;
                const y2 = rect2.top + rect2.height / 2 - svgRect.top;

                // Determine color
                let lineColor = '#0d9488'; // Default teal
                if (evaluationColors && evaluationColors[animalId]) {
                    lineColor = evaluationColors[animalId] === 'correct' ? '#22c55e' : '#ef4444'; // Green or Red
                }

                // Draw SVG Line
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('stroke', lineColor);
                line.setAttribute('stroke-width', '4');
                line.setAttribute('stroke-linecap', 'round');
                
                svg.appendChild(line);
            }
        }

        function clearLines() {
            if (isEvaluated) return;
            connections = {};
            selectedAnimal = null;
            updateDotsUI();
            drawLines();
        }

        function checkAnswers() {
            const resultsArea = document.getElementById('results-area');
            const instructionText = document.getElementById('instruction-text');
            
            // Ensure all 5 are connected
            if (Object.keys(connections).length < animals.length) {
                instructionText.innerHTML = '<span class="text-orange-500 font-bold">Please connect all animals to their homes before checking!</span>';
                return;
            }

            isEvaluated = true;
            document.getElementById('blocker').style.display = 'block'; // Block further clicks
            
            let score = 0;
            let evaluationColors = {};

            animals.forEach(animal => {
                const userHomeId = connections[animal.id];
                if (userHomeId === animal.correctHome) {
                    score++;
                    evaluationColors[animal.id] = 'correct';
                } else {
                    evaluationColors[animal.id] = 'incorrect';
                }
            });

            // Redraw lines with correct/incorrect colors
            drawLines(evaluationColors);

            // Display Score
            resultsArea.classList.remove('hidden');
            document.getElementById('retry-btn').classList.remove('hidden');
            instructionText.innerText = "Here are your results!";

            if (score === animals.length) {
                resultsArea.innerHTML = `<span class="text-green-600">Perfect Score! ${score}/${animals.length} 🌟</span>`;
            } else {
                resultsArea.innerHTML = `<span class="text-red-500">You scored ${score} out of ${animals.length}. Keep practicing!</span>`;
            }
        }

        function resetGame() {
            connections = {};
            selectedAnimal = null;
            isEvaluated = false;
            
            document.getElementById('blocker').style.display = 'none';
            document.getElementById('results-area').classList.add('hidden');
            document.getElementById('retry-btn').classList.add('hidden');
            document.getElementById('instruction-text').innerText = "Click the diamond next to an animal, then click the diamond next to its home to draw a line.";
            
            updateDotsUI();
            drawLines();
        }

        // Run on load
        window.onload = initGame;
    </script>

</body></html>
