<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tick the Correct Option</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#eaf9ff,#ffffff,#eefbf0);
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

.main-box{
width:100%;
max-width:1100px;
background:#ffffff;
border:5px solid #00b8f0;
border-radius:30px;
padding:30px 28px 40px;
position:relative;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
animation:fadeIn 0.8s ease;
}

/* FLOATING SHAPES */

.main-box::before{
content:"";
position:absolute;
top:-70px;
right:-70px;
width:220px;
height:220px;
background:rgba(0,184,240,0.08);
border-radius:50%;
animation:floatOne 8s ease-in-out infinite;
}

.main-box::after{
content:"";
position:absolute;
bottom:-70px;
left:-70px;
width:220px;
height:220px;
background:rgba(255,64,129,0.08);
border-radius:50%;
animation:floatTwo 10s ease-in-out infinite;
}

/* HEADER */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
position:relative;
z-index:2;
gap:15px;
}

.heading{
font-size:30px;
font-weight:700;
color:#00a8e8;
}

.badge{
background:#c94aa2;
color:#fff;
padding:8px 18px;
font-size:16px;
font-weight:700;
border-radius:8px;
animation:pulse 2s infinite;
white-space:nowrap;
}

/* QUESTION BOX */

.question-box{
background:#f9fcff;
border:2px solid #c9efff;
border-radius:22px;
padding:22px;
margin-bottom:22px;
position:relative;
z-index:2;
transition:0.35s;
animation:fadeUp 0.6s ease;
}

.question-box:hover{
transform:translateY(-4px);
box-shadow:0 10px 22px rgba(0,0,0,0.08);
}

/* QUESTION */

.question{
font-size:24px;
font-weight:600;
color:#333;
margin-bottom:18px;
line-height:1.6;
}

/* OPTIONS */

.options{
display:flex;
flex-wrap:wrap;
gap:14px;
}

.option-btn{
background:#fff;
border:2px solid #ff5ca8;
border-radius:14px;
padding:13px 18px;
font-size:19px;
font-weight:500;
color:#333;
cursor:pointer;
transition:0.3s;
min-width:220px;
text-align:left;
}

.option-btn:hover{
background:#fff0f7;
transform:translateX(5px);
box-shadow:0 8px 16px rgba(255,92,168,0.25);
}

.option-btn.correct{
background:#d9f8d9;
border-color:#2e7d32;
color:#1b5e20;
animation:correctPulse 0.5s ease;
}

.option-btn.wrong{
background:#ffd9dd;
border-color:#c62828;
color:#b71c1c;
animation:wrongShake 0.4s ease;
}

/* SCORE */

.score{
margin-top:28px;
text-align:center;
font-size:34px;
font-weight:700;
color:#0047ab;
position:relative;
z-index:2;
}

/* RESET */

.reset-area{
text-align:center;
margin-top:24px;
position:relative;
z-index:2;
}

.reset-btn{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:#fff;
border:none;
padding:14px 38px;
border-radius:40px;
font-size:18px;
font-weight:700;
cursor:pointer;
box-shadow:0 8px 18px rgba(255,152,0,0.35);
transition:0.35s;
}

.reset-btn:hover{
transform:translateY(-3px) scale(1.05);
}

/* ANIMATIONS */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeIn{

from{
opacity:0;
}

to{
opacity:1;
}

}

@keyframes correctPulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

@keyframes wrongShake{

0%{
transform:translateX(0);
}

25%{
transform:translateX(-6px);
}

50%{
transform:translateX(6px);
}

75%{
transform:translateX(-4px);
}

100%{
transform:translateX(0);
}

}

@keyframes floatOne{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(15px);
}

100%{
transform:translateY(0px);
}

}

@keyframes floatTwo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0px);
}

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
}

.main-box{
padding:20px 14px 30px;
border-radius:22px;
}

.top-bar{
flex-direction:column;
align-items:flex-start;
}

.heading{
font-size:22px;
line-height:1.5;
}

.badge{
font-size:13px;
padding:6px 12px;
}

.question-box{
padding:16px;
}

.question{
font-size:18px;
margin-bottom:14px;
}

.options{
flex-direction:column;
}

.option-btn{
font-size:15px;
padding:12px;
width:100%;
min-width:auto;
}

.score{
font-size:24px;
}

.reset-btn{
width:100%;
font-size:15px;
padding:13px 16px;
}

}

</style>
</head>

<body>

<div class="main-box">

<div class="top-bar">
<div class="heading">
A. Tick (✓) the correct option.
</div>

<div class="badge">
DECISION MAKING
</div>
</div>

<div id="quiz"></div>

<div class="score" id="score">
Score: 0 / 5
</div>

<div class="reset-area">
<button class="reset-btn" onclick="resetQuiz()">
Reset
</button>
</div>

</div>

<script>

const questions = [

{
question:'1. Which part of the plant is colourful?',
options:[
'i. Leaf',
'ii. Stem',
'iii. Flower'
],
answer:'iii. Flower'
},

{
question:'2. What do plant give us to breathe?',
options:[
'i. Smoke',
'ii. Air',
'iii. Oxygen'
],
answer:'iii. Oxygen'
},

{
question:'3. Which of these is a big plant?',
options:[
'i. Grass',
'ii. Tree',
'iii. Herb'
],
answer:'ii. Tree'
},

{
question:'4. What should we do to plants?',
options:[
'i. Cut them',
'ii. Take care of them',
'iii. Burn them'
],
answer:'ii. Take care of them'
},

{
question:'5. Plants with soft stems:',
options:[
'i. Herb',
'ii. Shrub',
'iii. Tree'
],
answer:'i. Herb'
}

];

let score = 0;
let answered = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

quiz.innerHTML = "";

questions.forEach((q,index)=>{

const box = document.createElement("div");

box.className = "question-box";

box.style.animationDelay = `${index * 0.15}s`;

const question = document.createElement("div");

question.className = "question";

question.innerText = q.question;

box.appendChild(question);

const options = document.createElement("div");

options.className = "options";

q.options.forEach(option=>{

const btn = document.createElement("button");

btn.className = "option-btn";

btn.innerText = option;

btn.onclick = ()=>checkAnswer(btn,option,q.answer,options);

options.appendChild(btn);

});

box.appendChild(options);

quiz.appendChild(box);

});

}

function checkAnswer(button,selected,correctAnswer,optionsDiv){

const buttons = optionsDiv.querySelectorAll(".option-btn");

buttons.forEach(btn=>{

btn.disabled = true;

if(btn.innerText === correctAnswer){

btn.classList.add("correct");

}

});

if(selected === correctAnswer){

score++;

}else{

button.classList.add("wrong");

}

answered++;

document.getElementById("score").innerText =
`Score: ${score} / ${questions.length}`;

if(answered === questions.length){

let incorrect = questions.length - score;

setTimeout(()=>{

alert(
`✅ Correct Answers: ${score}\n❌ Incorrect Answers: ${incorrect}`
);

},400);

}

}

function resetQuiz(){

score = 0;
answered = 0;

document.getElementById("score").innerText =
`Score: 0 / ${questions.length}`;

loadQuiz();

}

loadQuiz();

</script>

</body>
</html>
